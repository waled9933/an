<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>مصحف وليد الذهبي V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; --txt: #333; --card: white; }
        .dark { --bg: #121212; --txt: #e0e0e0; --card: #1e1e1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--txt); margin: 0; padding-bottom: 90px; }
        header { background: var(--p); height: 110px; border-radius: 0 0 30px 30px; padding: 20px; color: white; display: flex; align-items: center; justify-content: center; }
        .page { display: none; padding: 15px; }
        .active-page { display: block; }
        .mic-section { text-align: center; margin: -25px 20px 20px; background: var(--card); padding: 20px; border-radius: 20px; border: 2px solid var(--g); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .mic-btn { width: 65px; height: 65px; background: #e74c3c; color: white; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; }
        .listening { animation: pulse 1s infinite; background: #c0392b; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .sura-item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; border-right: 5px solid var(--p); cursor: pointer; }
        .quran-view { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--g); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .ayat-text { font-family: 'Amiri', serif; font-size: 24px; line-height: 2.3; text-align: justify; }
        .audio-player { position: fixed; bottom: 85px; width: 92%; left: 4%; background: var(--p); color: white; padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 10px; z-index: 1000; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .play-btn { background: var(--g); border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-size: 20px; }
    </style>
</head>
<body class="dark">

<header><h3>مصحف وليد الذهبي</h3></header>

<div id="home" class="page active-page">
    <div class="mic-section">
        <p style="font-weight:bold;">🎤 ابحث بصوتك عن اسم السورة</p>
        <button id="mic" class="mic-btn" onclick="startVoiceSearch()">🎤</button>
        <p id="status" style="font-size: 11px; margin-top: 8px; color: var(--g);">اضغط وابدأ الكلام</p>
    </div>
    <div id="fihris"></div>
</div>

<div id="reader" class="page">
    <button onclick="stopAudio(); showPage('home')" style="background:none; border:1px solid #888; border-radius:10px; padding:8px 20px; color:var(--txt); margin-bottom:15px; cursor:pointer;">🔙 العودة للفهرس</button>
    <div class="quran-view"><div id="content-body" class="ayat-text"></div></div>
</div>

<div id="player" class="audio-player" style="display: none;">
    <button class="play-btn" onclick="toggleAudio()" id="p-btn">⏸</button>
    <div style="flex:1"><div id="p-name" style="font-size: 13px; font-weight: bold;"></div><div style="font-size:10px; opacity:0.8;">بصوت الشيخ المنشاوي</div></div>
    <div onclick="stopAudio()" style="cursor:pointer; padding: 10px; font-weight:bold;">✖</div>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    let audio = new Audio();
    
    // فك قفل الصوت (حل مشكلة المتصفح)
    const unlockAudio = () => {
        audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(() => {});
        window.removeEventListener('click', unlockAudio);
        window.removeEventListener('touchstart', unlockAudio);
    };
    window.addEventListener('click', unlockAudio);
    window.addEventListener('touchstart', unlockAudio);

    const fihris = document.getElementById('fihris');
    fihris.innerHTML = suras.map((s, i) => `<div class="sura-item" onclick="openSurah(${i+1}, '${s}')"><span><b>${i+1}. ${s}</b></span><span style="color:var(--g)">📖 🔊</span></div>`).join('');

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
    }

    async function openSurah(id, name) {
        showPage('reader');
        document.getElementById('content-body').innerHTML = "جاري تحميل الآيات...";
        const audioId = String(id).padStart(3, '0');
        
        // سيرفر صوتي مباشر
        audio.src = `https://server8.mp3quran.net/minsh/mjw/${audioId}.mp3`;
        audio.play().catch(() => { document.getElementById('p-btn').innerText = "▶"; });
        
        document.getElementById('player').style.display = 'flex';
        document.getElementById('p-name').innerText = "سورة " + name;
        document.getElementById('p-btn').innerText = "⏸";

        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            let text = "";
            data.data.ayahs.forEach(a => text += `${a.text} ﴿${a.numberInSurah}﴾ `);
            document.getElementById('content-body').innerHTML = text;
        } catch(e) { document.getElementById('content-body').innerHTML = "تأكد من اتصال الإنترنت لتحميل النص."; }
    }

    function toggleAudio() {
        if(audio.paused) { audio.play(); document.getElementById('p-btn').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('p-btn').innerText = "▶"; }
    }

    function stopAudio() { audio.pause(); document.getElementById('player').style.display = 'none'; }

    function startVoiceSearch() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return alert("المتصفح لا يدعم البحث الصوتي");
        
        const recognition = new SpeechRecognition();
        recognition.lang = 'ar-SA';
        document.getElementById('mic').classList.add('listening');
        document.getElementById('status').innerText = "اسمعك.. قل اسم السورة";

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('mic').classList.remove('listening');
            const index = suras.findIndex(s => text.includes(s));
            if(index !== -1) openSurah(index + 1, suras[index]);
            else document.getElementById('status').innerText = "لم أفهم، جرب مرة أخرى";
        };
        recognition.onerror = () => {
            document.getElementById('mic').classList.remove('listening');
            alert("تأكد من السماح للميكروفون في إعدادات التطبيق");
        };
        recognition.start();
    }
</script>
</body>
</html>
