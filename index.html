<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق المسلم - وليد</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e8f5e9; margin: 0; padding-bottom: 90px; text-align: center; }
        header { background: #2e7d32; color: white; padding: 25px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { padding: 15px; }
        .card { background: white; margin-bottom: 15px; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-right: 8px solid #2e7d32; transition: 0.3s; cursor: pointer; }
        .card:active { transform: scale(0.95); background: #f1f8e9; }
        .card h3 { margin: 0; color: #1b5e20; }
        
        /* زر الشيخ الروبوت الذكي */
        #ai-btn { position: fixed; bottom: 100px; left: 20px; background: #ff9800; color: white; border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 6px 20px rgba(0,0,0,0.3); border: 3px solid white; z-index: 9999; }
        
        /* شريط التنقل السفلي */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 3px solid #2e7d32; z-index: 1000; }
        .nav-item { font-size: 16px; color: #2e7d32; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>تطبيق المسلم الشامل</h1>
        <p>بإشراف المبرمج وليد</p>
    </header>

    <div class="container">
        <div class="card" onclick="window.location.href='https://quran.ksu.edu.sa/m.php'">
            <h3>📖 القرآن الكريم (قراءة واستماع)</h3>
            <p>اضغط للفتح الآن</p>
        </div>

        <div class="card" onclick="window.location.href='https://www.hisnmuslim.com/index.php?ar=ar_azkar_morning'">
            <h3>🤲 أذكار الصباح والمساء</h3>
            <p>حصن المسلم كاملاً</p>
        </div>

        <div class="card" onclick="window.location.href='https://www.tvquran.com/ar/'">
            <h3>🎧 إذاعات القرآن الكريم</h3>
            <p>بث مباشر 24 ساعة</p>
        </div>
        
        <div class="card" onclick="window.location.href='https://ar.wikipedia.org/wiki/%D8%A7%D9%84%D8%B1%D9%82%D9%8A%D8%A9_%D8%A7%D9%84%D8%B4%D8%B1%D8%B1%D8%B9%D9%8A%D8%A9'">
            <h3>🛡️ الرقية الشرعية</h3>
            <p>للعلاج والتحصين</p>
        </div>
    </div>

    <div id="ai-btn" onclick="alert('أهلاً بك يا وليد! أنا المساعد الذكي، التطبيق الآن يعمل بكامل طاقته وكل الأزرار تستجيب.')">🤖</div>

    <div class="nav-bar">
        <div class="nav-item" onclick="location.reload()">🏠 الرئيسية</div>
        <div class="nav-item" onclick="window.location.href='https://quran.ksu.edu.sa/'">📖 القرآن</div>
        <div class="nav-item" onclick="window.location.href='https://tanzil.net/'">⚙️ إعدادات</div>
    </div>

</body>
</html>
