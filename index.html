<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق وليد الشامل</title>
    <style>
        body { font-family: 'Amiri', serif; background: #fdfcf9; margin: 0; padding-bottom: 70px; }
        header { background: #1b5e20; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; }
        .surah-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .surah-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; text-align: center; border: 1px solid #e0e0e0; }
        .surah-card:hover { background: #e8f5e9; }
        
        /* شاشة القراءة */
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 200; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .back-btn { background: #1b5e20; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .ayah { font-size: 26px; line-height: 2.2; text-align: center; border-bottom: 1px solid #eee; padding: 15px; }

        /* صندوق الدردشة */
        #chat-ui { position: fixed; bottom: 80px; left: 20px; width: 300px; height: 400px; background: white; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 5px 25px rgba(0,0,0,0.3); z-index: 300; border: 2px solid #1b5e20; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; font-size: 14px; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; border: 1px solid #ddd; padding: 8px; border-radius: 5px; outline: none; }
        #bot-toggle { position: fixed; bottom: 20px; left: 20px; background: #ff9800; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; z-index: 400; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<header>
    <h1>تطبيق المسلم (وليد)</h1>
    <p>المصحف كامل ومساعد ذكي</p>
</header>

<div class="container" id="main-menu">
    <div class="surah-grid" id="surah-list">
        </div>
</div>

<div id="reader">
    <button class="back-btn" onclick="closeReader()">⬅️ عودة للقائمة</button>
    <div id="quran-text"></div>
</div>

<div id="bot-toggle" onclick="toggleChat()">🤖</div>

<div id="chat-ui">
    <div style="background:#1b5e20; color:white; padding:10px; text-align:center;">مساعد وليد الذكي</div>
    <div class="chat-body" id="chat-msgs"><div>أهلاً وليد! اسألني أي سؤال وسأرد عليك حالاً.</div></div>
    <div class="chat-input">
        <input type="text" id="user-msg" placeholder="اكتب هنا...">
        <button onclick="botReply()" style="background:#1b5e20; color:white; border:none; margin-right:5px; border-radius:5px;">إرسال</button>
    </div>
</div>

<script>
    // توليد قائمة الـ 114 سورة
    const surahList = document.getElementById('surah-list');
    for (let i = 1; i <= 114; i++) {
        surahList.innerHTML += `<div class="surah-card" onclick="loadSurah(${i})">سورة رقم ${i}</div>`;
    }

    async function loadSurah(id) {
        const textDiv = document.getElementById('quran-text');
        textDiv.innerHTML = "جاري تحميل كلام الله...";
        document.getElementById('reader').style.display = 'block';
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            let content = `<h2>${data.data.name}</h2>`;
            data.data.ayahs.forEach(a => {
                content += `<div class="ayah">${a.text} ﴿${a.numberInSurah}﴾</div>`;
            });
            textDiv.innerHTML = content;
        } catch(e) { textDiv.innerHTML = "تأكد من الإنترنت."; }
    }

    function closeReader() { document.getElementById('reader').style.display = 'none'; }
    function toggleChat() { 
        const c = document.getElementById('chat-ui');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
    }

    function botReply() {
        const input = document.getElementById('user-msg');
        const msgs = document.getElementById('chat-msgs');
        if(!input.value) return;
        msgs.innerHTML += `<div><b>أنت:</b> ${input.value}</div>`;
        const q = input.value;
        input.value = "";
        setTimeout(() => {
            let reply = "هذا سؤال جميل! سأبحث لك في التفاسير وأخبرك.";
            if(q.includes("السلام")) reply = "وعليكم السلام ورحمة الله وبركاته يا وليد!";
            if(q.includes("اسمك")) reply = "أنا مساعدك الشخصي في تطبيق وليد.";
            msgs.innerHTML += `<div style="color:green;"><b>الروبوت:</b> ${reply}</div>`;
            msgs.scrollTop = msgs.scrollHeight;
        }, 500);
    }
</script>

</body>
</html>
