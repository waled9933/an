<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد الذهبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a3622;
            --gold: #c5a059;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: #333;
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--gold);
        }
        .container { padding: 15px; }
        
        /* تصميم قائمة السور */
        .sura-list { display: grid; gap: 10px; }
        .sura-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            border-right: 5px solid var(--primary);
        }
        .sura-info { display: flex; align-items: center; gap: 15px; }
        .sura-num {
            background: var(--gold);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        /* صفحة القراءة */
        #reader-page {
            display: none;
            background: white;
            min-height: 100vh;
            padding: 20px;
        }
        .quran-text {
            font-family: 'Amiri', serif;
            font-size: 26px;
            line-height: 2.2;
            text-align: justify;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 15px;
        }
        
        /* مشغل الصوت السفلي */
        .audio-player {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 15px;
            display: none;
            align-items: center;
            justify-content: space-around;
            border-top: 2px solid var(--gold);
        }
        .btn-back {
            background: var(--gold);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h2 id="main-title">مصحف وليد الذهبي</h2>
</header>

<div class="container" id="home-page">
    <div class="sura-list" id="list-container">
        </div>
</div>

<div id="reader-page">
    <button class="btn-back" onclick="goBack()">🔙 رجوع للقائمة</button>
    <h3 id="surah-title" style="text-align: center; color: var(--primary);"></h3>
    <div class="quran-text" id="quran-content">
        جاري التحميل...
    </div>
</div>

<div class="audio-player" id="player">
    <div id="playing-name">سورة الفاتحة</div>
    <audio id="main-audio" controls style="height: 30px;"></audio>
</div>

<script>
    const suras = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس"]; // أضف باقي السور هنا

    // إنشاء القائمة
    const listContainer = document.getElementById('list-container');
    suras.forEach((name, index) => {
        const card = document.createElement('div');
        card.className = 'sura-card';
        card.innerHTML = `
            <div class="sura-info">
                <div class="sura-num">${index + 1}</div>
                <div style="font-weight: bold;">سورة ${name}</div>
            </div>
            <div style="color: var(--gold);">📖 قراءة واستماع</div>
        `;
        card.onclick = () => openSurah(index + 1, name);
        listContainer.appendChild(card);
    });

    function openSurah(id, name) {
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('reader-page').style.display = 'block';
        document.getElementById('player').style.display = 'flex';
        document.getElementById('surah-title').innerText = "سورة " + name;
        document.getElementById('playing-name').innerText = "جاري تشغيل: " + name;
        
        // جلب نص السورة
        fetch(`https://api.alquran.cloud/v1/surah/${id}`)
            .then(res => res.json())
            .then(data => {
                let text = "";
                data.data.ayahs.forEach(ayah => {
                    text += ayah.text + ` <span style="color:var(--gold)">﴿${ayah.numberInSurah}﴾</span> `;
                });
                document.getElementById('quran-content').innerHTML = text;
            });

        // تشغيل الصوت (الشيخ المنشاوي مثلاً)
        const audioId = String(id).padStart(3, '0');
        const audioPlayer = document.getElementById('main-audio');
        audioPlayer.src = `https://server8.mp3quran.net/minsh/mjw/${audioId}.mp3`;
        audioPlayer.play();
    }

    function goBack() {
        document.getElementById('home-page').style.display = 'block';
        document.getElementById('reader-page').style.display = 'none';
        document.getElementById('player').style.display = 'none';
        document.getElementById('main-audio').pause();
    }
</script>

</body>
</html>
