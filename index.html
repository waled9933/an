<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد - التدبر الشامل</title>
    
    <meta name="theme-color" content="#0a3622">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="https://i.ibb.co/L5Q3QJm/walid-quran-icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #0a3622; --gold: #c5a059; --bg: #fdfcf0; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        header { background: var(--green); color: var(--gold); padding: 25px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* التبويبات السفلية */
        .tabs-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--green); display: flex; padding: 10px 0; border-top: 4px solid var(--gold); z-index: 4000; }
        .tab-btn { flex: 1; color: #fff; text-align: center; cursor: pointer; font-size: 12px; opacity: 0.7; }
        .tab-btn.active { opacity: 1; color: var(--gold); font-weight: bold; }
        .tab-btn i { display: block; font-size: 20px; margin-bottom: 4px; }

        .section { display: none; padding: 20px; }
        .section.active { display: block; }

        /* شبكة السور */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .card { background: white; border: 2px solid var(--gold); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        
        /* شاشة القراءة */
        #q-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .ayah-text { font-family: 'Amiri', serif; font-size: 26px; line-height: 2.2; text-align: center; background: #fffdf5; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); }
        .player-box { position: sticky; bottom: 0; background: var(--green); padding: 15px; border-radius: 20px 20px 0 0; margin: 20px -20px -20px -20px; }

        /* الأذكار */
        .azkar-item { background: white; padding: 15px; border-radius: 12px; border-right: 5px solid var(--gold); margin-bottom: 10px; line-height: 1.6; }

        /* الروبوت المتدبر */
        #bot-box { position: fixed; bottom: 85px; left: 15px; background: var(--gold); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 3000; cursor: pointer; border: 3px solid white; }
        #chat-window { position: fixed; bottom: 160px; left: 15px; width: 330px; height: 450px; background: white; border-radius: 20px; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 3001; border: 2px solid var(--green); overflow: hidden; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 12px; font-size: 14px; max-width: 85%; line-height: 1.5; }
        .msg.bot { background: #e8f5e9; align-self: flex-start; border-right: 4px solid var(--green); }
        .msg.user { background: var(--gold); color: white; align-self: flex-end; }
    </style>
</head>
<body>

<header>
    <h1>مصحف وليد للتدبر</h1>
    <p>القرآن كاملاً • أذكار شاملة • روبوت فقهي</p>
</header>

<div class="tabs-bar">
    <div class="tab-btn active" onclick="showSec('quran')">📖<br>القرآن</div>
    <div class="tab-btn" onclick="showSec('azkar')">🤲<br>الأذكار</div>
    <div class="tab-btn" onclick="showSec('sibha')">📿<br>السبحة</div>
</div>

<div id="quran-sec" class="section active">
    <div class="grid" id="surah-grid"></div>
</div>

<div id="q-viewer">
    <button onclick="closeV()" style="padding:10px 20px; background:red; color:white; border:none; border-radius:10px; cursor:pointer;">❌ إغلاق</button>
    <div id="q-content" class="ayah-text"></div>
    <div class="player-box">
        <div id="p-title" style="color:white; font-size:12px; text-align:center; margin-bottom:5px;"></div>
        <audio id="main-audio" controls style="width:100%"></audio>
    </div>
</div>

<div id="azkar-sec" class="section">
    <h3 style="color:var(--green)">الأذكار اليومية الشاملة</h3>
    <div id="azkar-list"></div>
</div>

<div id="sibha-sec" class="section" style="text-align:center; padding-top:50px;">
    <div id="count" style="font-size:80px; color:var(--green); font-weight:bold;">0</div>
    <button onclick="inc()" style="width:150px; height:150px; border-radius:50%; background:var(--green); color:white; font-size:20px; border:8px solid var(--gold); cursor:pointer;">سبّح</button>
    <br><button onclick="res()" style="margin-top:20px; background:none; border:none; color:red; cursor:pointer;">إعادة العداد</button>
</div>

<div id="bot-box" onclick="toggleChat()">🤖</div>
<div id="chat-window">
    <div style="background:var(--green); color:white; padding:15px; text-align:center; font-weight:bold;">الشيخ الروبوت (للتدبر والفقه)</div>
    <div class="chat-body" id="chat-msgs">
        <div class="msg bot">مرحباً يا وليد.. أنا هنا لأتدبر معك كلام الله. اسألني عن أي حكم شرعي أو حكمة من عبادة وسأجيبك بتفصيل.</div>
    </div>
    <div style="display:flex; padding:10px; border-top:1px solid #ddd;">
        <input type="text" id="bot-in" style="flex:1; padding:10px; border-radius:20px; border:1px solid #ddd;" placeholder="لماذا فرضت الصلاة؟">
        <button onclick="askAI()" style="background:var(--green); color:white; border:none; width:40px; height:40px; border-radius:50%; margin-right:5px;">➡️</button>
    </div>
</div>

<script>
    // 1. إدارة السور والتحميل
    const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    const grid = document.getElementById('surah-grid');
    surahs.forEach((n, i) => {
        grid.innerHTML += `<div class="card" onclick="openS(${i+1}, '${n}')"><b>${n}</b><br><small style="color:gray">${i+1}</small></div>`;
    });

    async function openS(id, name) {
        document.getElementById('q-viewer').style.display = 'block';
        document.getElementById('q-content').innerHTML = "جاري تحميل نص السورة...";
        const audio = document.getElementById('main-audio');
        audio.src = `https://server12.mp3quran.net/maher/${id.toString().padStart(3, '0')}.mp3`;
        audio.play();
        document.getElementById('p-title').innerText = "استماع إلى سورة: " + name;

        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            let h = `<h2>${data.data.name}</h2>`;
            data.data.ayahs.forEach(a => h += a.text + ` ﴿${a.numberInSurah}﴾ `);
            document.getElementById('q-content').innerHTML = h;
        } catch(e) { document.getElementById('q-content').innerHTML = "تحتاج لنت لتحميل النص أول مرة."; }
    }

    function closeV() { document.getElementById('q-viewer').style.display = 'none'; document.getElementById('main-audio').pause(); }

    // 2. إدارة الأذكار الشاملة
    const azkarArr = [
        {t: "أذكار الصباح", d: "أصبحنا وأصبح الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له."},
        {t: "أذكار المساء", d: "أمسينا وأمسى الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له."},
        {t: "أذكار النوم", d: "باسمك ربي وضعت جنبي، وبك أرفعه، فإن أمسكت نفسي فارحمها."},
        {t: "بعد الصلاة", d: "أستغفر الله (3 مرات).. اللهم أنت السلام ومنك السلام تباركت يا ذا الجلال والإكرام."},
        {t: "دعاء الكرب", d: "لا إله إلا الله العظيم الحليم، لا إله إلا الله رب العرش العظيم."}
    ];
    const azkarList = document.getElementById('azkar-list');
    azkarArr.forEach(a => {
        azkarList.innerHTML += `<div class="azkar-item"><b>${a.t}</b><br>${a.d}</div>`;
    });

    // 3. السبحة
    let c = localStorage.getItem('s-count') || 0;
    document.getElementById('count').innerText = c;
    function inc() { c++; document.getElementById('count').innerText = c; localStorage.setItem('s-count', c); if(window.navigator.vibrate) window.navigator.vibrate(50); }
    function res() { c=0; document.getElementById('count').innerText = 0; localStorage.setItem('s-count', 0); }

    // 4. الروبوت المتدبر (العقل المطور)
    function toggleChat() { const w = document.getElementById('chat-window'); w.style.display = (w.style.display==='flex')?'none':'flex'; }
    
    function askAI() {
        const input = document.getElementById('bot-in');
        const msgs = document.getElementById('chat-msgs');
        if(!input.value) return;
        const q = input.value;
        msgs.innerHTML += `<div class="msg user">${q}</div>`;
        input.value = "";

        setTimeout(() => {
            let res = "يا وليد، تدبرك في " + q + " يفتح لك أبواب الخير. الله عز وجل يريد منا فهم الحكمة وراء كل فعل.";
            
            // محرك التدبر الذكي
            if(q.includes("صلاة") || q.includes("الصلاة")) {
                res = "لماذا فرض الله الصلاة 5 مرات؟ لتكون معراجاً لروحك كل بضع ساعات. هي ليست عبئاً، بل هي محطات وقود إيمانية تفرغ فيها همومك وتستمد القوة من الخالق. (أرحنا بها يا بلال) تدل على أنها راحة لا تكليف شاق.";
            } else if(q.includes("حكم") || q.includes("لماذا فرض")) {
                res = "كل ما فرضه الله هو لحماية الإنسان؛ فالحلال طيب للنفس، والحرام خبيث يؤذي الجسد أو المجتمع. الله غني عن عباداتنا، لكننا نحن الفقراء إليه لنرتقي بأنفسنا.";
            } else if(q.includes("تدبر") || q.includes("كيف")) {
                res = "التدبر يا وليد هو ألا تمر على الآية دون أن تسأل: (ماذا يريد الله مني هنا؟). ابدأ بسورة الفاتحة، تأمل في (إياك نعبد)، ستجد أنك تطلب العون من القوي الذي لا يهزم.";
            }

            msgs.innerHTML += `<div class="msg bot">${res}</div>`;
            msgs.scrollTop = msgs.scrollHeight;
            const s = new SpeechSynthesisUtterance(res); s.lang = 'ar-SA'; window.speechSynthesis.speak(s);
        }, 600);
    }

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id+'-sec').classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
