<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الاستجابة</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f4f8; padding: 20px; }
        .btn { background: #2e7d32; color: white; padding: 20px; margin: 10px; border-radius: 10px; cursor: pointer; display: block; font-size: 20px; }
        #robot { position: fixed; bottom: 20px; left: 20px; background: orange; width: 70px; height: 70px; border-radius: 50%; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 4px solid white; box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <h2>اضغط على أي زرار للتجربة:</h2>
    
    <div class="btn" onclick="alert('شغال: القرآن هيفتح هنا الصبح')">📖 فتح القرآن</div>
    <div class="btn" onclick="alert('شغال: الأذكار هتفتح هنا الصبح')">🤲 فتح الأذكار</div>
    
    <div id="robot" onclick="alert('أنا الروبوت وشغال يا وليد، مفيش أي تعليق في الكود!')">🤖</div>

</body>
</html>
