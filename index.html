<script>
    // دالة ذكية لتشغيل الصوت مع سيرفر احتياطي
    function playSafeAudio(id, type) {
        const audio = (type === 'quran') ? document.getElementById('main-audio') : document.getElementById('tafsir-audio');
        const audioId = String(id).padStart(3, '0');
        
        // السيرفرات الأساسية والاحتياطية
        const servers = {
            quran: [
                `https://server12.mp3quran.net/maher/${audioId}.mp3`, // الأساسي
                `https://server10.mp3quran.net/maher/${audioId}.mp3`  // الاحتياطي
            ],
            tafsir: [
                `https://server14.mp3quran.net/s_hkm/${audioId}.mp3`, // الأساسي
                `https://archive.org/download/tafsir_moussar/${audioId}.mp3` // احتياطي (أرشيف)
            ]
        };

        let currentServerIndex = 0;
        audio.src = servers[type][currentServerIndex];

        // لو حصل خطأ في السيرفر الأول، جرب التاني فوراً
        audio.onerror = function() {
            if (currentServerIndex < servers[type].length - 1) {
                currentServerIndex++;
                console.log("السيرفر الأول معطل، جاري التحويل للسيرفر الاحتياطي...");
                audio.src = servers[type][currentServerIndex];
                audio.play();
            } else {
                alert("عذراً، يبدو أن هناك مشكلة مؤقتة في سيرفرات الصوت. جرب مرة أخرى لاحقاً.");
            }
        };

        audio.play();
    }
</script>
