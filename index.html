<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مصحف وليد PRO</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .main-card { background: white; max-width: 450px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        h1 { color: #2d5a27; }
        select { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; font-size: 16px; border: 2px solid #2d5a27; }
        audio { width: 100%; margin: 10px 0; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="main-card">
    <h1>مصحف وليد PRO</h1>
    <p>النسخة الأساسية (العمود الفقري)</p>
    
    <select id="surahPicker" onchange="startApp()">
        <option value="">-- اختر السورة --</option>
        </select>

    <div id="audioPlayer">
        <h3>القرآن الكريم</h3>
        <audio id="quran" controls></audio>
        
        <h3>التفسير الميسر</h3>
        <audio id="tafsir" controls></audio>
    </div>

    <div class="footer">مشروع وليد - 114 سورة كاملة</div>
</div>

<script>
    const names = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"];

    const picker = document.getElementById('surahPicker');
    names.forEach((n, i) => {
        let opt = document.createElement('option');
        opt.value = String(i + 1).padStart(3, '0');
        opt.innerHTML = (i + 1) + ". " + n;
        picker.appendChild(opt);
    });

    function startApp() {
        const id = picker.value;
        if(id) {
            // "الوقود" الأصلي - ماهر المعيقلي
            document.getElementById('quran').src = `https://server12.mp3quran.net/maher/${id}.mp3`;
            // "محرك التفسير" - السعدي
            document.getElementById('tafsir').src = `https://download.quranicaudio.com/tafsir/arabic/saadi/${id}.mp3`;
        }
    }
</script>

</body>
</html>
