<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق وليد - المصحف المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --green: #154726; --light-bg: #f9fbf9; }
        body { font-family: 'Tajawal', sans-serif; background: var(--light-bg); margin: 0; padding-bottom: 90px; }
        header { background: var(--green); color: var(--gold); padding: 25px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .tabs { display: flex; justify-content: center; background: white; padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--gold); }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; color: var(--green); }
        .tab.active { border-bottom: 3px solid var(--gold); color: var(--gold); }
        
        .container { padding: 15px; }
        .item-card { background: white; margin-bottom: 10px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .play-btn { background: var(--green); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; }

        /* الروبوت الذكي */
        #bot-icon { position: fixed; bottom: 20px; left: 20px; background: var(--gold); width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 3px solid white; }
        #chat { position: fixed; bottom: 95px; left: 20px; width: 300px; height: 400px; background: white; border-radius: 20px; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1001; border: 2px solid var(--green); overflow: hidden; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; background: #fdfdfd; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <h1>تطبيق وليد الشامل</h1>
    <p>قرآن • أذكار • ذكاء اصطناعي</p>
</header>

<div class="tabs">
    <div class="tab active" onclick="showSec('quran')">📖 القرآن</div>
    <div class="tab" onclick="showSec('azkar')">🤲 الأذكار</div>
</div>

<div id="quran" class="container sec">
    </div>

<div id="azkar" class="container sec" style="display:none;">
    <div class="item-card"><span>أذكار الصباح</span> <button class="play-btn" onclick="playAudio('https://server12.mp3quran.net/maher/001.mp3')">▶️ استماع</button></div>
    <div class="item-card"><span>أذكار المساء</span> <button class="play-btn" onclick="playAudio('https://server12.mp3quran.net/maher/002.mp3')">▶️ استماع</button></div>
</div>

<div id="bot-icon" onclick="toggleChat()">🤖</div>
<div id="chat">
    <div style="background:var(--green); color:white; padding:12px; text-align:center;">الشيخ الروبوت الذكي</div>
    <div id="chat-msgs" class="chat-body">أهلاً يا وليد، اسألني عن تفسير آية أو فضل سورة وسأرد عليك حالاً.</div>
    <div style="display:flex; padding:10px; border-top:1px solid #eee;">
        <input type="text" id="bot-input" style="flex:1; border:1px solid #ddd; padding:10px; border-radius:20px;" placeholder="اكتب سؤالك...">
        <button onclick="aiReply()" style="background:var(--green); color:white; border:none; padding:10px; border-radius:50%; margin-right:5px;">➡️</button>
    </div>
</div>

<script>
    const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس"];
    const qDiv = document.getElementById('quran');
    surahs.forEach((s, i) => {
        let id = (i+1).toString().padStart(3, '0');
        qDiv.innerHTML += `<div class="item-card"><span>${i+1}. ${s}</span> <button class="play-btn" onclick="playAudio('https://server12.mp3quran.net/maher/${id}.mp3')">▶️ استماع</button></div>`;
    });

    function playAudio(url) {
        let a = new Audio(url);
        a.play();
        alert("بدأ الاستماع الآن بصوت الشيخ ماهر المعيقلي");
    }

    function showSec(id) {
        document.querySelectorAll('.sec').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
    }

    function toggleChat() {
        const c = document.getElementById('chat');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
    }

    function aiReply() {
        const input = document.getElementById('bot-input');
        const msgs = document.getElementById('chat-msgs');
        if(!input.value) return;
        const q = input.value;
        msgs.innerHTML += `<div style="text-align:left; color:blue; margin-top:5px;">أنت: ${q}</div>`;
        input.value = "";

        setTimeout(() => {
            let res = "يا وليد، " + q + " سؤال ممتاز. الإسلام يحثنا دائماً على البحث والعلم، وسأقوم الآن بتحليل الإجابة من المصادر الموثوقة.";
            if(q.includes("سورة")) res = "كل سور القرآن لها فضل عظيم، وأنت الآن تستمع لسور من اختيارك في تطبيقك.";
            
            msgs.innerHTML += `<div style="text-align:right; color:green; margin-top:5px;">الروبوت: ${res}</div>`;
            const s = new SpeechSynthesisUtterance(res);
            s.lang = 'ar-SA';
            window.speechSynthesis.speak(s);
            msgs.scrollTop = msgs.scrollHeight;
        }, 600);
    }
</script>
</body>
</html>
