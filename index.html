<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف وليد الذكي V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; --txt: #333; --card-bg: white; }
        .dark { --bg: #1a1a1a; --txt: #eee; --card-bg: #2d2d2d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--txt); margin: 0; transition: 0.3s; padding-bottom: 80px; overflow-x: hidden; }
        
        header { background: var(--p); height: 150px; border-radius: 0 0 35px 35px; padding: 20px; color: white; position: relative; }
        .night-toggle { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 10px; font-size: 12px; cursor: pointer; }
        
        .prayer-card { background: linear-gradient(135deg, #f3e5ab 0%, #c5a059 100%); margin: -50px 15px 15px; border-radius: 20px; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 2px solid white; }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* البحث الصوتي */
        .voice-btn { width: 60px; height: 60px; background: #e74c3c; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; margin: 10px auto; cursor: pointer; box-shadow: 0 4px 15px rgba(231,76,60,0.3); border: none; }
        .listening { animation: pulse 1.5s infinite; background: #c0392b; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .sura-card { background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--p); box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .quran-text { font-family: 'Amiri', serif; font-size: 22px; line-height: 2.2; text-align: justify; padding: 20px; background: var(--card-bg); border-radius: 20px; margin-top: 15px; border: 1px solid var(--g); }

        /* بوت المحادثة */
        #bot-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .bot-content { background: var(--card-bg); width: 90%; max-height: 80%; border-radius: 25px; padding: 20px; overflow-y: auto; text-align: center; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); height: 70px; display: flex; border-top: 1px solid #eee; z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--p); font-weight: bold; }
    </style>
</head>
<body class="dark">

<div id="home" class="page active-page">
    <header>
        <div class="night-toggle" onclick="toggleNight()">🌙 وضع ليلي</div>
        <h2 style="margin-top: 10px;">مرحباً بك، وليد 👋</h2>
        <p id="hijri-date" style="font-size: 13px; opacity: 0.8;">١٤ رمضان ١٤٤٧ هـ</p>
    </header>

    <div class="prayer-card">
        <div>
            <div style="font-size: 14px; color: #5a461b;">صلاة الفجر</div>
            <div style="font-size: 40px; font-weight: bold; color: #221a0a;">04:42</div>
        </div>
        <div style="font-size: 50px;">🕌</div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <p>اضغط للبحث الصوتي في القرآن</p>
        <button id="main-mic" class="voice-btn" onclick="startVoiceSearch()">🎤</button>
        <p id="status-text" style="font-size: 12px; color: var(--g);"></p>
    </div>
</div>

<div id="quran" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color: var(--p);">المصحف الشريف</h2>
        <button id="back-btn" style="display:none; background:none; border:1px solid var(--g); border-radius:8px; padding:5px 10px; cursor:pointer;" onclick="loadFihris()">العودة للفهرس</button>
    </div>
    <div id="quran-container"></div>
</div>

<div id="bot-modal">
    <div class="bot-content">
        <h3 style="color:var(--p)">الروبوت وليد الذكي 🤖</h3>
        <div id="bot-display" style="padding:15px; background:#f9f9f9; border-radius:15px; margin:10px 0; min-height:50px; color:#333;">أهلاً يا وليد، اسألني أي سؤال ديني وسأجيبك بصوتي..</div>
        <button class="voice-btn" onclick="startBotVoice()">🎤</button>
        <button onclick="closeBot()" style="margin-top:15px; background:none; border:none; color:red;">إغلاق</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('home')">🏠 الرئيسية</div>
    <div class="nav-item" onclick="showPage('quran')">📖 المصحف</div>
    <div class="nav-item" onclick="openBot()">🤖 الروبوت</div>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    
    let audio = new Audio();

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(id === 'quran') loadFihris();
    }

    function toggleNight() { document.body.classList.toggle('dark'); }

    // --- نظام الفهرس والصوت ---
    function loadFihris() {
        audio.pause();
        document.getElementById('back-btn').style.display = 'none';
        const container = document.getElementById('quran-container');
        container.innerHTML = suras.map((s, i) => `
            <div class="sura-card" onclick="readSurah(${i+1}, '${s}')">
                <span><b>${i+1}. ${s}</b></span>
                <span>🔊</span>
            </div>
        `).join('');
    }

    async function readSurah(id, name) {
        const container = document.getElementById('quran-container');
        document.getElementById('back-btn').style.display = 'block';
        container.innerHTML = `<div class="quran-text">جاري تحميل سورة ${name} والآن سيتم تشغيل الصوت...</div>`;
        
        // تشغيل الصوت (بصوت المنشاوي من سيرفر mp3 مباشر)
        const audioId = String(id).padStart(3, '0');
        audio.src = `https://server8.mp3quran.net/minsh/mjw/${audioId}.mp3`;
        audio.play();

        // جلب النص
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
        const data = await res.json();
        let html = `<h3 style="text-align:center">${name}</h3>`;
        data.data.ayahs.forEach(a => html += `${a.text} ﴿${a.numberInSurah}﴾ `);
        container.innerHTML = `<div class="quran-text">${html}</div>`;
    }

    // --- البحث الصوتي الذكي ---
    function startVoiceSearch() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ar-SA';
        document.getElementById('main-mic').classList.add('listening');
        document.getElementById('status-text').innerText = "اسمعك.. قل اسم السورة";

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            document.getElementById('main-mic').classList.remove('listening');
            
            // البحث عن اسم السورة في القائمة
            const index = suras.findIndex(s => text.includes(s));
            if(index !== -1) {
                showPage('quran');
                readSurah(index + 1, suras[index]);
                speak(`تم العثور على سورة ${suras[index]}، جاري التشغيل`);
            } else {
                document.getElementById('status-text').innerText = "لم أفهم، حاول مرة أخرى";
            }
        };
        recognition.start();
    }

    // --- الروبوت المتكلم ---
    function openBot() { document.getElementById('bot-modal').style.display = 'flex'; }
    function closeBot() { document.getElementById('bot-modal').style.display = 'none'; audio.pause(); }

    function startBotVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ar-SA';
        recognition.onresult = (event) => {
            const q = event.results[0][0].transcript;
            document.getElementById('bot-display').innerText = "سألتني: " + q;
            
            // ردود ذكية بسيطة (يمكن توسيعها)
            let reply = "هذا سؤال جميل يا وليد، جاري البحث في التفسير..";
            if(q.includes("صلاة")) reply = "الصلاة هي ركن الدين الأساسي، وأول ما يحاسب عليه العبد. هل تريد مني تذكيرك بمواقيت الصلاة؟";
            if(q.includes("أذكار")) reply = "الأذكار حصن المسلم، داوم عليها يا وليد ليرتاح قلبك.";

            document.getElementById('bot-display').innerHTML = `<b>الرد:</b> ${reply}`;
            speak(reply);
        };
        recognition.start();
    }

    function speak(text) {
        const synth = window.speechSynthesis;
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'ar-SA';
        synth.speak(utter);
    }
</script>
</body>
</html>
