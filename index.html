<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق وليد</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #f4f4f4; }
        /* الإطار اللي بيعرض المصحف */
        #quran-frame { width: 100%; height: 100%; border: none; }
        
        /* زر الروبوت */
        #ai-button {
            position: fixed; bottom: 20px; left: 20px;
            width: 60px; height: 60px; background: #1b5e20;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 30px; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 1000;
        }

        /* نافذة الدردشة */
        #chat-window {
            position: fixed; bottom: 90px; left: 20px;
            width: 300px; height: 400px; background: white;
            border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            display: none; flex-direction: column; z-index: 1000; border: 2px solid #1b5e20;
        }
        .chat-header { background: #1b5e20; color: white; padding: 10px; text-align: center; border-radius: 12px 12px 0 0; }
        .chat-content { flex: 1; padding: 10px; overflow-y: auto; background: #f9f9f9; }
        .chat-input { display: flex; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; border: none; padding: 10px; outline: none; }
        .chat-input button { background: #1b5e20; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <iframe id="quran-frame" src="https://quran.com/ar"></iframe>

    <div id="ai-button" onclick="toggleChat()">🤖</div>

    <div id="chat-window">
        <div class="chat-header">الشيخ الروبوت</div>
        <div class="chat-content" id="chat-box">
            <div>أهلاً وليد، أنا معاك دلوقتي والمصحف قدامك. اطلب أي مساعدة!</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="اسأل الروبوت...">
            <button onclick="sendMessage()">إرسال</button>
        </div>
    </div>

    <script>
        function toggleChat() {
            var chat = document.getElementById('chat-window');
            chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
        }
        function sendMessage() {
            var input = document.getElementById('user-input');
            var box = document.getElementById('chat-box');
            if (input.value.trim() !== "") {
                box.innerHTML += "<div style='margin-top:10px; color:blue;'><b>أنت:</b> " + input.value + "</div>";
                setTimeout(() => {
                    box.innerHTML += "<div style='margin-top:10px; color:green;'><b>الروبوت:</b> الله يفتح عليك يا وليد، هرد عليك بكرة بالتفصيل لما نربط الذكاء الحقيقي.</div>";
                    box.scrollTop = box.scrollHeight;
                }, 800);
                input.value = "";
                box.scrollTop = box.scrollHeight;
            }
        }
    </script>
</body>
</html>
