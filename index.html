<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد PRO</title>
    <style>
        body { font-family: sans-serif; background: #0a3622; color: white; text-align: center; margin: 0; padding: 20px; }
        .sura-btn { background: #c5a059; border: none; padding: 15px; margin: 10px; width: 90%; border-radius: 12px; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; }
        #reader { display: none; background: white; color: #000; padding: 20px; border-radius: 20px; text-align: justify; font-size: 22px; line-height: 2; margin-top: 20px; }
        .player-box { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e1e1e; padding: 15px; border-top: 2px solid #c5a059; display: none; }
    </style>
</head>
<body>

    <h2>مصحف وليد الذهبي 🌙</h2>
    <p id="msg" style="font-size: 12px; color: #c5a059;">اضغط على أي سورة لتشغيل الصوت والآيات</p>

    <div id="list">
        <button class="sura-btn" onclick="start(1, 'الفاتحة')">1. سورة الفاتحة</button>
        <button class="sura-btn" onclick="start(2, 'البقرة')">2. سورة البقرة</button>
        <button class="sura-btn" onclick="start(3, 'آل عمران')">3. سورة آل عمران</button>
    </div>

    <div id="reader"></div>

    <div class="player-box" id="player">
        <div id="now-playing"></div>
        <audio id="myAudio" controls style="width: 100%; margin-top: 10px;"></audio>
    </div>

<script>
    const audio = document.getElementById('myAudio');

    async function start(id, name) {
        // 1. تشغيل الصوت فوراً
        const audioId = String(id).padStart(3, '0');
        // جربنا رابط مختلف تماماً
        audio.src = `https://server8.mp3quran.net/minsh/mjw/${audioId}.mp3`;
        
        document.getElementById('player').style.display = 'block';
        document.getElementById('now-playing').innerText = "تسمع الآن: سورة " + name;
        
        audio.play().catch(e => {
            alert("اضغط على زرار Play في الشريط الأسود تحت عشان يشتغل");
        });

        // 2. تحميل الآيات كاملة
        const reader = document.getElementById('reader');
        reader.style.display = 'block';
        reader.innerText = "جاري تحميل كلام الله...";

        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            const fullText = data.data.ayahs.map(a => a.text + ` (${a.numberInSurah})`).join(" ");
            reader.innerText = fullText;
        } catch(err) {
            reader.innerText = "مشكلة في تحميل النص، تأكد من الإنترنت";
        }
    }
</script>
</body>
</html>
