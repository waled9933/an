<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: #f8f9fa; }
        header { background: var(--p); color: white; padding: 15px; text-align: center; border-bottom: 3px solid var(--g); }
        .sura-card { background: white; padding: 15px; margin: 10px; border-radius: 10px; display: flex; justify-content: space-between; border-right: 5px solid var(--p); cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #reader { display: none; padding: 20px; background: white; min-height: 100vh; }
        .quran-text { font-family: 'Amiri', serif; font-size: 24px; line-height: 2; text-align: justify; }
        /* مشغل الصوت المحسن */
        .player { position: fixed; bottom: 0; width: 100%; background: var(--p); color: white; padding: 15px; display: none; text-align: center; z-index: 1000; }
        .play-btn { background: var(--g); border: none; padding: 10px 20px; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header><h2>مصحف وليد الذهبي</h2></header>

<div id="home">
    <div id="list" style="padding: 10px;"></div>
</div>

<div id="reader">
    <button onclick="goBack()" style="padding: 10px; margin-bottom: 20px;">🔙 رجوع</button>
    <div class="quran-text" id="content"></div>
</div>

<div class="player" id="audio-player">
    <div id="sura-name" style="margin-bottom: 10px;"></div>
    <audio id="main-audio" controls style="width: 100%;"></audio>
</div>

<script>
    const suras = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"];
    
    const listDiv = document.getElementById('list');
    suras.forEach((s, i) => {
        listDiv.innerHTML += `<div class="sura-card" onclick="openSura(${i+1}, '${s}')"><span>${i+1}. ${s}</span><span>▶ استماع</span></div>`;
    });

    function openSura(id, name) {
        document.getElementById('home').style.display = 'none';
        document.getElementById('reader').style.display = 'block';
        document.getElementById('audio-player').style.display = 'block';
        document.getElementById('sura-name').innerText = "سورة " + name;

        // النص
        fetch(`https://api.alquran.cloud/v1/surah/${id}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('content').innerHTML = data.data.ayahs.map(a => a.text + ` ﴿${a.numberInSurah}﴾`).join(" ");
            });

        // الصوت (الرابط المباشر)
        const audioId = String(id).padStart(3, '0');
        const player = document.getElementById('main-audio');
        player.src = `https://server8.mp3quran.net/minsh/mjw/${audioId}.mp3`;
        // محاولة التشغيل، وإذا فشل سيظهر شريط التحكم للمستخدم ليضغط بنفسه
        player.play().catch(() => console.log("تحتاج لضغط زر التشغيل يدوياً"));
    }

    function goBack() {
        document.getElementById('home').style.display = 'block';
        document.getElementById('reader').style.display = 'none';
        document.getElementById('audio-player').style.display = 'none';
        document.getElementById('main-audio').pause();
    }
</script>
</body>
</html>
