<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف وليد PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; --txt: #333; --card: white; }
        .dark { --bg: #121212; --txt: #e0e0e0; --card: #1e1e1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--txt); margin: 0; transition: 0.3s; padding-bottom: 90px; }
        
        header { background: var(--p); height: 140px; border-radius: 0 0 40px 40px; padding: 20px; color: white; position: relative; display: flex; align-items: center; justify-content: center; }
        .night-toggle { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* البحث الصوتي */
        .mic-section { text-align: center; margin: -40px 20px 20px; background: var(--card); padding: 20px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 2px solid var(--g); }
        .mic-btn { width: 65px; height: 65px; background: #e74c3c; color: white; border-radius: 50%; border: 4px solid white; font-size: 28px; cursor: pointer; box-shadow: 0 5px 15px rgba(231,76,60,0.3); transition: 0.2s; }
        .listening { animation: pulse 1.5s infinite; background: #c0392b; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* قائمة السور */
        .sura-item { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-right: 6px solid var(--p); box-shadow: 0 3px 8px rgba(0,0,0,0.05); cursor: pointer; }
        .sura-item:active { transform: scale(0.98); }

        /* منطقة القراءة */
        .quran-view { background: var(--card); border-radius: 25px; padding: 25px; margin-top: 10px; border: 1px solid var(--g); box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .ayat-text { font-family: 'Amiri', serif; font-size: 24px; line-height: 2.3; text-align: justify; word-spacing: 2px; }
        
        /* مشغل الصوت السفلي */
        .audio-player { position: fixed; bottom: 85px; width: 90%; left: 5%; background: var(--p); color: white; padding: 12px 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000; }
        .play-btn { background: var(--g); border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; color: #fff; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); height: 75px; display: flex; border-top: 1px solid #eee; z-index: 2000; padding-bottom: 10px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--p); font-weight: bold; }
    </style>
</head>
<body class="dark">

<header>
    <div class="night-toggle" onclick="toggleNight()">🌙 وضع ليلي</div>
    <h2 style="margin: 0;">مصحف وليد الذهبي</h2>
</header>

<div id="home" class="page active-page">
    <div class="mic-section">
        <p style="font-weight: bold; margin-bottom: 15px;">قل اسم السورة لفتحها مباشرة</p>
        <button id="mic" class="mic-btn" onclick="startVoiceSearch()">🎤</button>
        <p id="status" style="font-size: 12px; margin-top: 10px; color: var(--g);">اضغط وابدأ الكلام</p>
    </div>

    <div style="padding: 0 10px;">
        <h3 style="border-right: 4px solid var(--g); padding-right: 10px;">فهرس السور</h3>
        <div id="fihris"></div>
    </div>
</div>

<div id="reader" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <button onclick="showPage('home')" style="background:none; border:1px solid #888; border-radius:10px; padding:5px 15px; color:var(--txt);">🔙 رجوع</button>
        <h3 id="surah-title" style="margin:0; color:var(--p);">اسم السورة</h3>
    </div>
    <div class="quran-view">
        <div id="content-body" class="ayat-text">جاري تحميل الآيات...</div>
    </div>
</div>

<div id="player" class="audio-player" style="display: none;">
    <button class="play-btn" onclick="toggleAudio()" id="p-btn">⏸</button>
    <div style="flex:1">
        <div id="p-name" style="font-size: 13px; font-weight: bold;">سورة الفاتحة</div>
        <div style="font-size: 10px; opacity: 0.8;">بصوت الشيخ المنشاوي</div>
    </div>
    <div onclick="stopAudio()" style="cursor:pointer; padding: 5px;">✖</div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('home')">🏠 الرئيسية</div>
    <div class="nav-item" onclick="showPage('home')">📖 المصحف</div>
    <div class="nav-item">👤 ملفي</div>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    let audio = new Audio();
    
    // تحميل الفهرس
    const fihris = document.getElementById('fihris');
    fihris.innerHTML = suras.map((s, i) => `
        <div class="sura-item" onclick="openSurah(${i+1}, '${s}')">
            <span><b>${i+1}. ${s}</b></span>
            <span style="color:var(--g)">📖 🔊</span>
        </div>
    `).join('');

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
    }

    function toggleNight() { document.body.classList.toggle('dark'); }

    // فتح السورة وتشغيل الصوت
    async function openSurah(id, name) {
        showPage('reader');
        document.getElementById('surah-title').innerText = "سورة " + name;
        const body = document.getElementById('content-body');
        body.innerHTML = "جاري التحميل...";

        // 1. تشغيل الصوت
        const audioId = String(id).padStart(3, '0');
        audio.src = `https://server8.mp3quran.net/minsh/mjw/${audioId}.mp3`;
        audio.play();
        
        document.getElementById('player').style.display = 'flex';
        document.getElementById('p-name').innerText = "سورة " + name;
        document.getElementById('p-btn').innerText = "⏸";

        // 2. جلب النص
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            let text = id !== 1 && id !== 9 ? "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ <br>" : "";
            data.data.ayahs.forEach(a => {
                text += `${a.text} <span style="color:var(--g); font-size:16px;">﴿${a.numberInSurah}﴾</span> `;
            });
            body.innerHTML = text;
        } catch(e) { body.innerHTML = "تأكد من اتصالك بالإنترنت لتحميل الآيات."; }
    }

    function toggleAudio() {
        if(audio.paused) { audio.play(); document.getElementById('p-btn').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('p-btn').innerText = "▶"; }
    }

    function stopAudio() { audio.pause(); document.getElementById('player').style.display = 'none'; }

    // البحث الصوتي
    function startVoiceSearch() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ar-SA';
        const btn = document.getElementById('mic');
        const status = document.getElementById('status');
        
        btn.classList.add('listening');
        status.innerText = "اسمعك.. قل اسم السورة";

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            btn.classList.remove('listening');
            const index = suras.findIndex(s => text.includes(s));
            if(index !== -1) {
                openSurah(index + 1, suras[index]);
            } else {
                status.innerText = "لم أعرف السورة، جرب مرة أخرى";
            }
        };
        recognition.onerror = () => { btn.classList.remove('listening'); status.innerText = "حدث خطأ في الميكروفون"; };
        recognition.start();
    }
</script>
</body>
</html>
