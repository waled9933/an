<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد PRO - الملكوت</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }
        
        /* الخلفية */
        .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('space.jpg') no-repeat center center/cover; z-index: -1; }

        /* المصحف الـ 3D الذهبي اللي بيلف */
        .quran-3d {
            width: 200px; height: 250px;
            background: linear-gradient(135deg, #d4af37, #f1e05a, #d4af37);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.9);
            display: flex; justify-content: center; align-items: center;
            color: #000; font-weight: bold; font-size: 1.2rem;
            transform-style: preserve-3d;
            animation: rotateQuran 10s infinite linear;
            border: 2px solid #fff;
        }

        @keyframes rotateQuran {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>

    <div class="bg"></div>

    <div class="quran-3d">
        المصحف الشريف
    </div>

</body>
</html>
