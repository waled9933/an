<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد الملكي</title>
    
    <meta name="theme-color" content="#0a3622">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" href="https://i.ibb.co/L5Q3QJm/walid-quran-icon.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/L5Q3QJm/walid-quran-icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #0a3622; --gold: #c5a059; --bg: #fdfcf0; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        
        /* الهيدر الملكي */
        header { background: var(--green); color: var(--gold); padding: 30px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        header h1 { font-family: 'Amiri', serif; font-size: 35px; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        /* التبويبات السفلية الاحترافية */
        .main-tabs { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--green); display: flex; justify-content: space-around; padding: 10px; border-top: 5px solid var(--gold); z-index: 4000; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); }
        .main-tab { color: #888; text-align: center; cursor: pointer; flex: 1; transition: 0.3s; }
        .main-tab.active { color: var(--gold); font-weight: bold; }
        .main-tab span { display: block; font-size: 20px; }
        .main-tab p { margin: 0; font-size: 12px; }

        /* الشبكة والقوائم */
        .content-sec { display: none; padding: 20px; }
        .content-sec.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .surah-card { background: white; border: 2px solid var(--gold); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; position: relative; transition: 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .surah-card:active { transform: scale(0.95); }
        .surah-status { position: absolute; top: 5px; left: 5px; font-size: 10px; color: var(--green); }

        /* شاشة القراءة */
        #viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .q-content { font-family: 'Amiri', serif; font-size: 28px; line-height: 2.3; text-align: center; padding: 25px; background: #fffdf5; border: 2px solid var(--gold); border-radius: 15px; }
        .fixed-controls { position: sticky; bottom: 0; width: 100%; background: var(--green); padding: 15px; border-top: 4px solid var(--gold); margin-left: -20px; display: flex; flex-direction: column; align-items: center; }

        /* قسم الأذكار */
        .azkar-card { background: white; padding: 15px; border-radius: 15px; border-right: 5px solid var(--green); margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .azkar-card:active { background: #f9f9f9; }
        #azkar-view { display: none; padding: 20px; }
        .zekr-item { background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; font-size: 16px; line-height: 1.6; text-align: center; color: var(--green); }
        .zekr-count { background: var(--gold); color: white; border-radius: 50%; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; margin-top: 10px; }

        /* قسم السبحة الملكي */
        #sibha-sec { text-align: center; padding-top: 50px; }
        #sibha-counter { font-size: 60px; color: var(--green); font-weight: bold; margin-bottom: 20px; font-family: 'Amiri', serif; }
        .sibha-btns { display: flex; gap: 15px; justify-content: center; }
        .sibha-btn { background: var(--green); color: white; border: none; padding: 15px 30px; border-radius: 15px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .sibha-btn:active { transform: scale(0.9); background: var(--gold); }

        /* الروبوت المتدبر */
        #bot-icon { position: fixed; bottom: 100px; left: 20px; background: var(--gold); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; border: 3px solid white; box-shadow: 0 5px 20px rgba(0,0,0,0.4); z-index: 3000; cursor: pointer; }
        #chat { position: fixed; bottom: 180px; left: 20px; width: 330px; height: 450px; background: white; border-radius: 25px; display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.4); z-index: 3001; border: 2px solid var(--green); overflow: hidden; }
        .msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fdfdfd; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 14px; max-width: 85%; }
        .bot { background: #e8f5e9; align-self: flex-start; color: #1b5e20; border-right: 5px solid var(--green); }
        .user { background: var(--gold); color: white; align-self: flex-end; }
    </style>
</head>
<body>

<header>
    <h1>مصحف وليد الملكي</h1>
    <p>قرآن • أذكار • سبحة • تدبر 🌐</p>
</header>

<div class="main-tabs">
    <div class="main-tab active" onclick="showMainTab('quran')"><span>📖</span><p>القرآن</p></div>
    <div class="main-tab" onclick="showMainTab('azkar')"><span>🤲</span><p>الأذكار</p></div>
    <div class="main-tab" onclick="showMainTab('sibha')"><span>📿</span><p>السبحة</p></div>
</div>

<div id="quran-sec" class="content-sec active">
    <div class="grid" id="surah-grid"></div>
</div>

<div id="viewer">
    <button onclick="closeV()" style="background:#c62828; color:white; border:none; padding:12px 25px; border-radius:15px; cursor:pointer; font-weight:bold;">⬅️ العودة للقائمة</button>
    <div id="q-content" class="q-content"></div>
    <div class="fixed-controls">
        <div id="playing-info" style="color:white; font-size:12px; margin-bottom:8px; text-align:center;">اختر سورة للبدء</div>
        <audio id="audio-player" controls style="width:100%"></audio>
    </div>
</div>

<div id="azkar-sec" class="content-sec">
    <div class="azkar-card" onclick="openZekr('morning')"><span>أذكار الصباح</span> ➡️</div>
    <div class="azkar-card" onclick="openZekr('evening')"><span>أذكار المساء</span> ➡️</div>
    
    <div id="azkar-view">
        <button onclick="closeZekr()" style="background:#c62828; color:white; border:none; padding:10px; border-radius:10px; margin-bottom:15px; cursor:pointer;">❌ إغلاق</button>
        <div id="zekr-content"></div>
    </div>
</div>

<div id="sibha-sec" class="content-sec">
    <div id="sibha-counter">0</div>
    <div class="sibha-btns">
        <button class="sibha-btn" style="background:#ddd; color:#333;" onclick="resetSibha()">إعادة</button>
        <button class="sibha-btn" onclick="incrementSibha()">تسبيح (+1)</button>
    </div>
</div>

<div id="bot-icon" onclick="toggleChat()">🤖</div>
<div id="chat">
    <div style="background:var(--green); color:white; padding:15px; text-align:center; font-weight:bold; font-size:18px;">الشيخ الروبوت (المتدبر الذكي)</div>
    <div class="msgs" id="chat-msgs">
        <div class="msg bot">أهلاً يا وليد. اسألني عن حكمة الله، لماذا فرض الله كذا؟ أو تفسير آية.. أنا هنا لأتدبر معك بالصوت والكتابة. كيف أخدمك؟</div>
    </div>
    <div style="display:flex; padding:10px; background:white; border-top:1px solid #eee;">
        <input type="text" id="bot-in" style="flex:1; border:1px solid #ddd; padding:12px; border-radius:20px; outline:none;" placeholder="اكتب سؤالك الديني هنا...">
        <button onclick="askAI()" style="background:var(--green); color:white; border:none; width:45px; height:45px; border-radius:50%; margin-right:5px; cursor:pointer;">➡️</button>
    </div>
</div>

<script>
    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    const grid = document.getElementById('surah-grid');
    const audio = document.getElementById('audio-player');
    let db;

    // فتح قاعدة البيانات الداخلية IndexedDB (للتشغيل بدون نت)
    const request = indexedDB.open("WalidRoyalQuranDB", 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("surahs", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; renderGrid(); };

    // توليد الـ 114 سورة كاملة
    function renderGrid() {
        grid.innerHTML = "";
        surahNames.forEach((name, i) => {
            const id = i + 1;
            grid.innerHTML += `<div class="surah-card" onclick="startSurah(${id}, '${name}')">
                <span id="stat-${id}" class="surah-status"></span>
                <div style="font-size:12px; color:#aaa; margin-bottom:5px;">${id}</div>
                <div style="font-weight:bold; color:var(--green);">${name}</div>
            </div>`;
            checkOfflineStatus(id);
        });
    }

    async function checkOfflineStatus(id) {
        const tx = db.transaction("surahs", "readonly");
        tx.objectStore("surahs").get(id).onsuccess = e => {
            if(e.target.result) document.getElementById(`stat-${id}`).innerHTML = "✅ لمحمل";
        };
    }

    async function startSurah(id, name) {
        document.getElementById('playing-info').innerText = "جاري فتح: " + name;
        document.getElementById('viewer').style.display = "block";
        const content = document.getElementById('q-content');
        content.innerHTML = "جاري تحميل نص سورة " + name + "...";

        // تشغيل الصوت (ذكاء التحميل)
        const tx = db.transaction("surahs", "readonly");
        tx.objectStore("surahs").get(id).onsuccess = async e => {
            if(e.target.result) {
                // موجودة أوفلاين شغلها علطول
                audio.src = URL.createObjectURL(e.target.result.audio);
                audio.play();
                document.getElementById('playing-info').innerText = "تشغيل بدون نت: " + name + " ✅";
            } else {
                // مش موجودة شغلها أونلاين ونزلها
                const onlineUrl = `https://server12.mp3quran.net/maher/${id.toString().padStart(3, '0')}.mp3`;
                audio.src = onlineUrl;
                audio.play();
                document.getElementById('playing-info').innerText = "جاري التحميل والحفظ: " + name + "...";
                // تحميل السورة في الخزنة تلقائياً
                fetch(onlineUrl).then(r => r.blob()).then(blob => {
                    const saveTx = db.transaction("surahs", "readwrite");
                    saveTx.objectStore("surahs").put({ id: id, name: name, audio: blob });
                    saveTx.oncomplete = () => {
                        document.getElementById('playing-info').innerText = "تم حفظ السورة ✅. تشغيل: " + name;
                        document.getElementById(`stat-${id}`).innerHTML = "✅ لمحمل";
                    };
                });
            }
        };

        // جلب النص (قراءة)
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            let html = `<h2>${data.data.name}</h2>`;
            data.data.ayahs.forEach(a => html += a.text + ` ﴿${a.numberInSurah}﴾ `);
            content.innerHTML = html;
        } catch(e) { content.innerHTML = "عذراً، يجب الاتصال بالنت لجلب نص السورة لأول مرة."; }
    }

    function closeV() { document.getElementById('viewer').style.display = 'none'; audio.pause(); }

    // إدارة التبويبات السفلية
    function showMainTab(id) {
        document.querySelectorAll('.content-sec').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        event.currentTarget.classList.add('active');
        closeZekr();
    }

    // إدارة الأذكار الملكية
    const azkar = {
        morning: ["سبحان الله العظيم وبحمده (100 مرة)", "أستغفر الله وأتوب إليه (100 مرة)", "اللهم أنت ربي لا إله إلا أنت... (سيد الاستغفار)", "يا حي يا قيوم برحمتك أستغيث... (3 مرات)"],
        evening: ["سبحان الله وبحمده (100 مرة)", "أستغفر الله العظيم (100 مرة)", "اللهم بك أمسينا وبك أصبحنا... (سيد الاستغفار)", "اللهم إني أمسيـت أُشهدك... (4 مرات)"]
    };

    function openZekr(type) {
        document.getElementById('azkar-view').style.display = 'block';
        document.querySelectorAll('.azkar-card').forEach(c => c.style.display = 'none');
        const content = document.getElementById('zekr-content');
        content.innerHTML = "";
        azkar[type].forEach(z => content.innerHTML += `<div class="zekr-item">${z}<br><span class="zekr-count">🔁</span></div>`);
    }

    function closeZekr() {
        document.getElementById('azkar-view').style.display = 'none';
        document.querySelectorAll('.azkar-card').forEach(c => c.style.display = 'flex');
    }

    // إدارة السبحة الملكية
    let sibhaCount = parseInt(localStorage.getItem('sibhaCount')) || 0;
    document.getElementById('sibha-counter').innerText = sibhaCount;

    function incrementSibha() {
        sibhaCount++;
        document.getElementById('sibha-counter').innerText = sibhaCount;
        localStorage.setItem('sibhaCount', sibhaCount);
        if('vibrate' in navigator) navigator.vibrate(50); // اهتزاز بسيط
    }

    function resetSibha() {
        if(confirm('هل تريد إعادة عداد السبحة للصفر؟')) {
            sibhaCount = 0;
            document.getElementById('sibha-counter').innerText = 0;
            localStorage.setItem('sibhaCount', 0);
        }
    }

    // الروبوت الملكي المتدبر
    function toggleChat() { const c = document.getElementById('chat'); c.style.display = (c.style.display==='flex') ? 'none' : 'flex'; }

    function askAI() {
        const input = document.getElementById('bot-in');
        if(!input.value) return;
        const q = input.value;
        document.getElementById('chat-msgs').innerHTML += `<div class="msg user">${q}</div>`;
        input.value = "";

        setTimeout(() => {
            let res = "يا وليد، هذا سؤال عظيم. التدبر في الإسلام هو مفتاح الفهم.";
            if(q.includes("صلاة") || q.includes("الصلاة")) res = "فرض الله الصلاة لتكون حبل الوصل الذي لا ينقطع بينك وبينه، ولأنها تنهى عن الفحشاء والمنكر.";
            if(q.includes("تفسير") || q.includes("معنى")) res = "معاني القرآن هي بحر لا ينفد، وكلما تدبرت آية، فتح الله عليك فتوح العارفين.";
            
            document.getElementById('chat-msgs').innerHTML += `<div class="msg bot">${res}</div>`;
            document.getElementById('chat-msgs').scrollTop = document.getElementById('chat-msgs').scrollHeight;
            const s = new SpeechSynthesisUtterance(res); s.lang = 'ar-SA'; window.speechSynthesis.speak(s);
        }, 500);
    }
</script>
</body>
</html>
