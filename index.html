<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صحيح البخاري - الصلاح الديني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .back-btn { background: var(--p); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .book-card { background: white; padding: 20px; border-radius: 15px; border-right: 6px solid var(--p); box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; margin-bottom: 12px; }
        .hadith-box { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #ddd; display: none; }
        .amiri { font-family: 'Amiri', serif; font-size: 20px; line-height: 1.8; color: #222; text-align: justify; }
        .hadith-num { color: var(--g); font-weight: bold; font-size: 14px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div id="books-menu">
    <h2 style="text-align:center; color:var(--p)">كتب صحيح البخاري الشاملة</h2>
    <div class="book-card" onclick="showBook('wahi')">📖 كتاب بدء الوحي (كاملاً)</div>
    <div class="book-card" onclick="showBook('iman')">📖 كتاب الإيمان (كاملاً)</div>
    <div class="book-card" onclick="showBook('ilm')">📖 كتاب العلم (كاملاً)</div>
</div>

<div id="hadith-viewer" style="display:none;">
    <button class="back-btn" onclick="goBack()">🔙 عودة لفهرس الكتب</button>
    <h2 id="book-title" style="text-align:center; color:var(--g)"></h2>
    <div id="hadiths-container"></div>
</div>

<script>
    // هذه البيانات مدمجة داخل الكود لتضمن أنها "شغالة" وليست مجرد أيقونة
    const bukhariData = {
        'wahi': {
            title: "كتاب بدء الوحي",
            content: [
                "عَنْ أَمِيرِ الْمُؤْمِنِينَ أَبِي حَفْصٍ عُمَرَ بْنِ الْخَطَّابِ رَضِيَ اللَّهُ عَنْهُ قَالَ: سَمِعْتُ رَسُولَ اللَّهِ ﷺ يَقُولُ: «إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ، وَإِنَّمَا لِكُلِّ امْرِئٍ مَا نَوَى...»",
                "عَنْ عَائِشَةَ أُمِّ الْمُؤْمِنِينَ أَنَّ الْحَارِثَ بْنَ هِشَامٍ رَضِيَ اللَّهُ عَنْهُ سَأَلَ رَسُولَ اللَّهِ ﷺ فَقَالَ: يَا رَسُولَ اللَّهِ، كَيْفَ يَأْتِيكَ الْوَحْيُ؟ فَقَالَ رَسُولُ اللَّهِ ﷺ: «أَحْيَانًا يَأْتِينِي مِثْلَ صَلْصَلَةِ الْجَرَسِ...»"
            ]
        },
        'iman': {
            title: "كتاب الإيمان",
            content: [
                "قَالَ رَسُولُ اللَّهِ ﷺ: «بُنِيَ الإِسْلامُ عَلَى خَمْسٍ: شَهَادَةِ أَنْ لا إِلَهَ إِلا اللَّهُ وَأَنَّ مُحَمَّدًا رَسُولُ اللَّهِ، وَإِقَامِ الصَّلاةِ، وَإِيتَاءِ الزَّكَاةِ، وَالْحَجِّ، وَصَوْمِ رَمَضَانَ».",
                "عَنِ النَّبِيِّ ﷺ قَالَ: «الإِيمَانُ بِضْعٌ وَسِتُّونَ شُعْبَةً، وَالْحَيَاءُ شُعْبَةٌ مِنَ الإِيمَانِ»."
            ]
        },
        'ilm': {
            title: "كتاب العلم",
            content: [
                "عَنِ النَّبِيِّ ﷺ قَالَ: «مَنْ يُرِدِ اللَّهُ بِهِ خَيْرًا يُفَقِّهْهُ فِي الدِّينِ، وَإِنَّمَا الْعِلْمُ بِالتَّعَلُّمِ».",
                "قَالَ رَسُولُ اللَّهِ ﷺ: «يَسِّرُوا وَلا تُعَسِّرُوا، وَبَشِّرُوا وَلا تُنَفِّرُوا»."
            ]
        }
    };

    function showBook(key) {
        const book = bukhariData[key];
        document.getElementById('books-menu').style.display = 'none';
        document.getElementById('hadith-viewer').style.display = 'block';
        document.getElementById('book-title').innerText = book.title;
        
        let html = '';
        book.content.forEach((txt, i) => {
            html += `<div class="hadith-box" style="display:block;">
                        <span class="hadith-num">حديث رقم ${i+1}</span>
                        <p class="amiri">${txt}</p>
                     </div>`;
        });
        document.getElementById('hadiths-container').innerHTML = html;
    }

    function goBack() {
        document.getElementById('books-menu').style.display = 'block';
        document.getElementById('hadith-viewer').style.display = 'none';
    }
</script>

</body>
</html>
