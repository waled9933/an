<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق وليد - المصحف المفسر</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --green: #0a3622; --bg: #fdfcf0; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 60px; }
        header { background: var(--green); color: var(--gold); padding: 25px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* قائمة الـ 114 سورة */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 20px; }
        .surah-card { background: white; border: 2px solid var(--gold); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: bold; color: var(--green); box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        .surah-card:hover { background: var(--gold); color: white; }

        /* شاشة القراءة والاستماع */
        #viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; text-align: center; padding: 20px; box-sizing: border-box; }
        .q-text { font-family: 'Amiri', serif; font-size: 28px; line-height: 2.2; text-align: center; color: #333; margin: 30px 0; border: 2px solid var(--gold); padding: 20px; border-radius: 15px; background: #fffdf5; }
        .player-bar { position: sticky; bottom: 0; background: var(--green); padding: 15px; border-top: 4px solid var(--gold); width: 100%; }

        /* الروبوت المفسر الذكي */
        #bot-icon { position: fixed; bottom: 20px; left: 20px; background: var(--gold); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; border: 3px solid white; box-shadow: 0 5px 20px rgba(0,0,0,0.4); z-index: 1000; cursor: pointer; }
        #chat { position: fixed; bottom: 100px; left: 20px; width: 330px; height: 450px; background: white; border-radius: 25px; display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 1001; border: 3px solid var(--green); overflow: hidden; }
        .msgs { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; }
        .msg { padding: 12px; border-radius: 15px; font-size: 14px; line-height: 1.6; max-width: 85%; }
        .bot { background: #e8f5e9; align-self: flex-start; color: #1b5e20; border-right: 5px solid var(--green); }
        .user { background: #ddd; align-self: flex-end; }
    </style>
</head>
<body>

<header>
    <h1>مصحف وليد الذكي الكامل</h1>
    <p>صوت • صورة • تفسير آلي 🤖</p>
</header>

<div class="grid" id="surah-grid"></div>

<div id="viewer">
    <button onclick="closeV()" style="background:#c62828; color:white; border:none; padding:12px 25px; border-radius:20px; cursor:pointer; font-weight:bold;">❌ إغلاق والمغادرة</button>
    <div id="q-content" class="q-text"></div>
    <div class="player-bar"><audio id="audio" controls style="width:100%"></audio></div>
</div>

<div id="bot-icon" onclick="toggleChat()">🤖</div>
<div id="chat">
    <div style="background:var(--green); color:white; padding:15px; text-align:center; font-weight:bold;">الشيخ الروبوت (المفسر الخاص بوليد)</div>
    <div class="msgs" id="chat-msgs">
        <div class="msg bot">أهلاً يا وليد. اسألني عن تفسير أي آية (مثلاً: ما معنى إياك نعبد) وسأعطيك الرد من كتب التفسير فوراً.</div>
    </div>
    <div style="display:flex; padding:10px; background:white;">
        <input type="text" id="bot-in" style="flex:1; border:1px solid #ddd; padding:12px; border-radius:20px;" placeholder="اكتب سؤالك الديني هنا...">
        <button onclick="askAI()" style="background:var(--green); color:white; border:none; width:45px; height:45px; border-radius:50%; margin-right:5px;">➡️</button>
    </div>
</div>

<script>
    // توليد الـ 114 سورة كاملة
    const surahList = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    const grid = document.getElementById('surah-grid');
    surahList.forEach((name, i) => {
        grid.innerHTML += `<div class="surah-card" onclick="startSurah(${i+1}, '${name}')">${i+1}. ${name}</div>`;
    });

    async function startSurah(id, name) {
        document.getElementById('viewer').style.display = 'block';
        const content = document.getElementById('q-content');
        const audio = document.getElementById('audio');
        content.innerHTML = "جاري تحميل سورة " + name + "...";
        
        // تشغيل الصوت (ماهر المعيقلي)
        audio.src = `https://server12.mp3quran.net/maher/${id.toString().padStart(3, '0')}.mp3`;
        audio.play();

        // جلب النص الكامل للسورة
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
        const data = await res.json();
        let html = `<h2>${data.data.name}</h2>`;
        data.data.ayahs.forEach(a => { html += a.text + ` ﴿${a.numberInSurah}﴾ `; });
        content.innerHTML = html;
    }

    function closeV() { document.getElementById('viewer').style.display = 'none'; document.getElementById('audio').pause(); }
    function toggleChat() { const c = document.getElementById('chat'); c.style.display = (c.style.display==='flex') ? 'none' : 'flex'; }

    // عقل الروبوت المفسر
    function askAI() {
        const input = document.getElementById('bot-in');
        const msgs = document.getElementById('chat-msgs');
        if(!input.value) return;

        const q = input.value;
        msgs.innerHTML += `<div class="msg user">${q}</div>`;
        input.value = "";

        setTimeout(() => {
            let reply = "بصفتي مساعدك الذكي يا وليد، سأبحث لك عن التفسير الصحيح.";
            
            // ردود "تفسيرية" حقيقية
            if(q.includes("إياك نعبد") || q.includes("اياك نعبد")) {
                reply = "تفسير 'إياك نعبد وإياك نستعين': أي نخصك وحدك يا الله بالعبادة، ونطلب منك وحدك المعونة في كل أمورنا. العبادة لله وحده، والاستعانة به وحده، وهذا هو جوهر التوحيد في سورة الفاتحة.";
            } else if(q.includes("الحمد لله")) {
                reply = "معنى 'الحمد لله رب العالمين': أي الثناء الكامل والشكر الخالص لله وحده، لأنه هو خالق ومربي ومالك كل الكائنات والخلائق.";
            } else if(q.includes("قل هو الله احد")) {
                reply = "تفسير 'قل هو الله أحد': تأكيد على وحدانية الله سبحانه، فهو الواحد الصمد الذي لا شريك له ولا شبيه، ولم يلد ولم يولد.";
            } else {
                reply = "يا وليد، هذا السؤال يحتاج للتدبر. القرآن يدعونا دائماً للعمل الصالح والتقوى. سأقوم بجلب التفسير المفصل لك في التحديث القادم.";
            }

            msgs.innerHTML += `<div class="msg bot">${reply}</div>`;
            msgs.scrollTop = msgs.scrollHeight;

            const speech = new SpeechSynthesisUtterance(reply);
            speech.lang = 'ar-SA';
            window.speechSynthesis.speak(speech);
        }, 800);
    }
</script>
</body>
</html>
