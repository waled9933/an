<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الصلاح الديني للقرآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 120px; }
        .top { background: var(--p); height: 160px; border-radius: 0 0 40px 40px; padding: 20px; color: white; text-align: center; }
        .card { background: linear-gradient(135deg, #f3e5ab 0%, #c5a059 100%); margin: -80px 20px 20px; border-radius: 25px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid #fff; display: flex; justify-content: space-between; align-items: center; }
        .q-list { padding: 20px; }
        .s-card { background: white; padding: 18px; border-radius: 15px; margin-bottom: 12px; border-right: 6px solid var(--p); display: flex; justify-content: space-between; cursor: pointer; align-items: center; }
        
        .special-section { background: #fff3cd; border: 2px dashed var(--g); padding: 15px; margin: 20px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #856404; }

        #reader, #issues-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .ayat-text { font-family: 'Amiri', serif; font-size: 26px; line-height: 2.2; text-align: justify; margin-top: 20px; color: #222; }
        .issue-item { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-right: 4px solid var(--g); }

        .player-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--p); padding: 15px; border-top: 3px solid var(--g); z-index: 1001; display: none; }
        audio { width: 100%; height: 45px; }
    </style>
</head>
<body>

<div id="home-view">
    <div class="top"><h2>الصلاح الديني للقرآن</h2></div>
    <div class="card">
        <div><div style="font-size:14px; color:#5a461b;">القارئ الحالي</div><div style="font-size:24px; font-weight:bold; color:#3a2d0d;">الشيخ ماهر المعيقلي</div></div>
        <div style="font-size:50px;">🎙️</div>
    </div>

    <div class="special-section" onclick="openIssues()">
        🔍 قسم المسائل الجدلية في القرآن
    </div>

    <div class="q-list" id="list"></div>
</div>

<div id="issues-page">
    <button onclick="closeIssues()" style="background:var(--p); color:white; border:none; padding:10px 25px; border-radius:12px; cursor:pointer;">🔙 العودة للرئيسية</button>
    <h2 style="color:var(--p); text-align:center;">المسائل الجدلية والتفسيرية</h2>
    
    <div class="issue-item">
        <h3>مسألة النسخ في القرآن</h3>
        <p>محتوى تعليمي وتفسيري حول الآيات المنسوخة والناسخة.</p>
    </div>
</div>

<div id="reader">
    <button onclick="closeReader()" style="background:var(--p); color:white; border:none; padding:10px 25px; border-radius:12px; cursor:pointer; margin-bottom:10px;">🔙 رجوع</button>
    <div id="ayat-content" class="ayat-text"></div>
</div>

<div class="player-footer" id="audio-box">
    <div id="sura-label" style="color:white; font-size:14px; margin-bottom:8px; text-align:center;"></div>
    <audio id="main-audio" controls autoplay></audio>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    const audio = document.getElementById('main-audio');

    document.getElementById('list').innerHTML = suras.map((s, i) => `
        <div class="s-card" onclick="playSura(${i+1}, '${s}')">
            <span>${i+1}. سورة ${s}</span><span style="color:var(--g)">▶</span>
        </div>
    `).join('');

    function playSura(id, name) {
        const audioId = String(id).padStart(3, '0');
        audio.src = `https://server12.mp3quran.net/maher/${audioId}.mp3`;
        audio.play();
        document.getElementById('audio-box').style.display = 'block';
        document.getElementById('sura-label').innerText = "تستمع الآن: سورة " + name;
        document.getElementById('reader').style.display = 'block';
        fetch(`https://api.alquran.cloud/v1/surah/${id}`).then(r => r.json()).then(d => {
            document.getElementById('ayat-content').innerHTML = `<h3>سورة ${name}</h3>` + d.data.ayahs.map(a => a.text + ` ﴿${a.numberInSurah}﴾`).join(" ");
        });
    }

    function openIssues() { document.getElementById('issues-page').style.display = 'block'; }
    function closeIssues() { document.getElementById('issues-page').style.display = 'none'; }
    function closeReader() { document.getElementById('reader').style.display = 'none'; }
</script>

</body>
</html>
