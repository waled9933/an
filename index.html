<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد - PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --main-green: #0a3622; --gold: #c5a059; --light-bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--light-bg); margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* الهيدر العلوي */
        .top-bar { background: var(--main-green); height: 180px; border-radius: 0 0 40px 40px; padding: 20px; position: relative; color: white; display: flex; justify-content: space-between; align-items: flex-start; }
        .location { font-size: 14px; background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; }
        
        /* بطاقة مواقيت الصلاة (مثل الصورة) */
        .prayer-card { background: linear-gradient(135deg, #f1e4bc 0%, #d4bc78 100%); margin: -100px 20px 20px; border-radius: 25px; padding: 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 2px solid #fff; }
        .prayer-info h2 { margin: 0; color: #5a461b; font-size: 16px; }
        .prayer-time { font-size: 45px; font-weight: bold; color: #3a2d0d; margin: 10px 0; }
        .prayer-img { width: 100px; height: 100px; background: url('https://cdn-icons-png.flaticon.com/512/2903/2903541.png') no-repeat center; background-size: contain; }

        /* الأيقونات السريعة */
        .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px 20px; text-align: center; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .icon-circle { width: 55px; height: 55px; background: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .action-item span { font-size: 12px; font-weight: bold; color: #444; }

        /* الأقسام */
        .section { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* المصحف */
        .surah-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .surah-btn { background: white; padding: 15px; border-radius: 15px; border: 1px solid #eee; display: flex; align-items: center; gap: 10px; cursor: pointer; }

        /* القائمة السفلية (كما في الصورة) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; height: 70px; display: flex; border-top: 1px solid #eee; z-index: 1000; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; text-decoration: none; font-size: 11px; cursor: pointer; }
        .nav-link.active { color: var(--main-green); }
        .nav-link i { font-size: 22px; margin-bottom: 4px; }
        .badge { position: absolute; top: 10px; background: red; color: white; border-radius: 50%; width: 15px; height: 15px; font-size: 10px; text-align: center; line-height: 15px; }

        /* الروبوت AI */
        #bot-icon { position: fixed; bottom: 90px; left: 20px; background: var(--gold); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; color: white; box-shadow: 0 5px 20px rgba(0,0,0,0.3); cursor: pointer; z-index: 2000; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="location">📍 القاهرة، مصر</div>
    <div>🌙 14 رمضان، 1447 هـ</div>
</div>

<div class="prayer-card">
    <div class="prayer-info">
        <h2>الفجر القادم 🕌</h2>
        <div class="prayer-time">4:42 <small style="font-size:18px">ص</small></div>
        <div style="font-size:12px; color:#5a461b;">متبقي: 02:15:10</div>
    </div>
    <div class="prayer-img"></div>
</div>

<div class="quick-actions">
    <div class="action-item" onclick="showSec('quran')">
        <div class="icon-circle">📖</div><span>القرآن</span>
    </div>
    <div class="action-item" onclick="showSec('azkar')">
        <div class="icon-circle">🤲</div><span>الأذكار</span>
    </div>
    <div class="action-item" onclick="window.open('https://qiblafinder.withgoogle.com/')">
        <div class="icon-circle">🧭</div><span>القبلة</span>
    </div>
    <div class="action-item" onclick="showSec('sibha')">
        <div class="icon-circle">📿</div><span>السبحة</span>
    </div>
</div>

<div id="quran-sec" class="section active">
    <h3 style="margin-right:10px">فهرس السور</h3>
    <div class="surah-grid" id="surah-container"></div>
</div>

<div id="azkar-sec" class="section">
    <h3>أذكار المسلم</h3>
    <div style="background:white; padding:15px; border-radius:15px; margin-bottom:10px;">أذكار الصباح</div>
    <div style="background:white; padding:15px; border-radius:15px; margin-bottom:10px;">أذكار المساء</div>
</div>

<div id="sibha-sec" class="section" style="text-align:center">
    <div id="counter" style="font-size:80px; color:var(--main-green); margin:30px;">0</div>
    <button onclick="count()" style="width:150px; height:150px; border-radius:50%; background:var(--main-green); color:white; border:none; font-size:20px;">تسبيح</button>
</div>

<div id="bot-icon" onclick="alert('أهلاً وليد! أنا خادمك الذكي، كيف أساعدك في تدبر آية اليوم؟')">🤖</div>

<div class="bottom-nav">
    <div class="nav-link active" onclick="showSec('quran')"><i>🏠</i>الرئيسية</div>
    <div class="nav-link"><i>🕌</i>الصلاة</div>
    <div class="nav-link"><i>☪️</i>الأمة</div>
    <div class="nav-link" style="position:relative;">
        <span class="badge">9</span>
        <i>📩</i>الرسائل
    </div>
    <div class="nav-link"><i>👤</i>أنا</div>
</div>

<script>
    const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    const container = document.getElementById('surah-container');
    surahs.forEach((name, i) => {
        container.innerHTML += `<div class="surah-btn" onclick="playS(${i+1})">
            <span style="background:#eee; padding:5px 10px; border-radius:50%; font-size:12px;">${i+1}</span>
            <b>${name}</b>
        </div>`;
    });

    function playS(id) {
        alert("جاري تشغيل سورة رقم " + id + " بصوت الشيخ ماهر المعيقلي");
        // هنا يمكن إضافة كود تشغيل الصوت المطور من النسخ السابقة
    }

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-sec').classList.add('active');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    let c = 0;
    function count() { c++; document.getElementById('counter').innerText = c; if(navigator.vibrate) navigator.vibrate(50); }
</script>

</body>
</html>
