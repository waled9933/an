<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد الذهبي</title>
    <style>
        body { font-family: sans-serif; background: #0a3622; color: white; text-align: center; padding: 20px; }
        .search-box { width: 90%; padding: 15px; border-radius: 10px; border: none; font-size: 18px; margin-bottom: 20px; }
        .sura-card { background: #1e1e1e; padding: 15px; margin: 10px 0; border-radius: 12px; border-right: 5px solid #c5a059; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #c5a059; padding: 15px; display: none; color: black; font-weight: bold; }
        #quran-text { background: white; color: black; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: justify; line-height: 2; font-size: 20px; display: none; }
    </style>
</head>
<body>
    <h2>مصحف وليد الذهبي 🕌</h2>
    <input type="text" id="searchInput" class="search-box" placeholder="اكتب اسم السورة هنا..." onkeyup="filterSuras()">
    
    <div id="fihris"></div>
    <div id="quran-text"></div>

    <div id="playerBar" class="player-bar">
        <span id="playingName"></span>
        <button onclick="toggleAudio()" style="margin-right:20px; padding:5px 15px;">إيقاف/تشغيل</button>
    </div>

    <script>
        const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلّم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
        let audio = new Audio();

        function renderFihris() {
            const container = document.getElementById('fihris');
            container.innerHTML = suras.map((s, i) => `
                <div class="sura-card" onclick="openSurah(${i+1}, '${s}')">
                    <span>${i+1}. ${s}</span>
                    <span>🔊 إستماع وقراءة</span>
                </div>
            `).join('');
        }

        function filterSuras() {
            let input = document.getElementById('searchInput').value;
            let cards = document.getElementsByClassName('sura-card');
            for (let card of cards) {
                card.style.display = card.innerText.includes(input) ? "flex" : "none";
            }
        }

        async function openSurah(id, name) {
            // تشغيل الصوت
            const audioId = String(id).padStart(3, '0');
            audio.src = `https://server8.mp3quran.net/minsh/mjw/${audioId}.mp3`;
            audio.play().catch(e => alert("اضغط على تشغيل لتسمع الصوت"));

            document.getElementById('playerBar').style.display = "block";
            document.getElementById('playingName').innerText = "تستمع الآن: سورة " + name;

            // جلب النص
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            document.getElementById('quran-text').style.display = "block";
            document.getElementById('quran-text').innerText = data.data.ayahs.map(a => a.text).join(" ");
            window.scrollTo(0, document.getElementById('quran-text').offsetTop);
        }

        function toggleAudio() {
            if (audio.paused) audio.play();
            else audio.pause();
        }

        renderFihris();
    </script>
</body>
</html>
