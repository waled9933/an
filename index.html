<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الموسوعة الإيمانية - النسخة المشرقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #f0f4f2; /* أخضر فاتح جداً للملف */
            --primary-green: #2d5a47;
            --gold-accent: #b8860b;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #e8f0ec 0%, #fdfcf6 100%);
            color: #333;
            margin: 0;
            min-height: 100vh;
        }

        /* الشاشة الرئيسية الملونة */
        .home-screen { padding: 25px; text-align: center; }
        .header-title { 
            margin: 20px 0 40px; 
            color: var(--primary-green); 
            font-size: 30px; 
            font-weight: 900;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        /* تصميم الأيقونات الملونة */
        .main-icon {
            background: #ffffff;
            border-radius: 22px;
            padding: 25px 10px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            transition: transform 0.2s;
        }
        .main-icon:active { transform: translateY(3px); }

        .main-icon span { font-size: 40px; display: block; margin-bottom: 12px; }
        .main-icon p { margin: 0; font-weight: 700; color: #444; font-size: 15px; }

        /* ألوان مخصصة لكل أيقونة */
        .ic-quran { border-bottom: 5px solid #2ecc71; } /* أخضر */
        .ic-tafseer { border-bottom: 5px solid #3498db; } /* أزرق */
        .ic-story { border-bottom: 5px solid #f1c40f; } /* ذهبي */
        .ic-sahaba { border-bottom: 5px solid #e67e22; } /* برتقالي */
        .ic-azkar { border-bottom: 5px solid #9b59b6; } /* بنفسجي */
        .ic-pray { border-bottom: 5px solid #1abc9c; } /* تركواز */

        /* شاشة العرض */
        #content-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
        }

        .btn-back {
            background: var(--primary-green);
            color: white;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .quran-container {
            font-family: 'Amiri', serif;
            font-size: 24px;
            line-height: 2;
            text-align: center;
            padding: 20px;
            background: #fdfbf0;
            border-radius: 15px;
        }

        .audio-player-bar {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="home-screen">
    <h1 class="header-title">الكنوز الإيمانية</h1>
    
    <div class="icon-grid">
        <div class="main-icon ic-quran" onclick="openQuran()"><span>📖</span><p>المصحف الكريم</p></div>
        <div class="main-icon ic-tafseer" onclick="openTafseerMenu()"><span>📜</span><p>تفسير القرآن</p></div>
        <div class="main-icon ic-story" onclick="openWahidStory()"><span>✨</span><p>قصة الوحي</p></div>
        <div class="main-icon ic-sahaba" onclick="openSahaba()"><span>👥</span><p>مواقف الصحابة</p></div>
        <div class="main-icon ic-azkar" onclick="openAzkar()"><span>☀️</span><p>الأذكار</p></div>
        <div class="main-icon ic-pray" onclick="openPrayers()"><span>🕌</span><p>مواقيت الصلاة</p></div>
    </div>
</div>

<div id="content-screen">
    <div class="btn-back" onclick="closeScreen()">🔙 العودة للرئيسية</div>
    <div id="screen-body"></div>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    function showS(h) { 
        document.getElementById('screen-body').innerHTML = h; 
        document.getElementById('content-screen').style.display = 'block'; 
    }
    function closeScreen() { 
        document.getElementById('content-screen').style.display = 'none'; 
        if(window.currentAudio) window.currentAudio.pause();
    }

    // تعديل المصحف بإضافة الصوت
    function openQuran() {
        let h = `<h2>المصحف الشريف</h2><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">`;
        suras.forEach((s, i) => {
            h += `<div style="background:#fff; padding:15px; border-radius:10px; border:1px solid #eee; text-align:center;" onclick="readAndPlaySura(${i+1},'${s}')">${i+1}. ${s}</div>`;
        });
        h += `</div>`;
        showS(h);
    }

    async function readAndPlaySura(id, name) {
        showS("جاري تحميل السورة والصوت...");
        // تشغيل الصوت
        if(window.currentAudio) window.currentAudio.pause();
        window.currentAudio = new Audio(`https://server12.mp3quran.net/maher/${String(id).padStart(3,'0')}.mp3`);
        window.currentAudio.play();

        // عرض النص
        const r = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
        const d = await r.json();
        let h = `<h2>سورة ${name}</h2>
                 <div class="audio-player-bar">🔊 أنت تستمع الآن لسورة ${name}</div>
                 <div class="quran-container">${d.data.ayahs.map(a=>a.text+` ﴿${a.numberInSurah}﴾`).join(' ')}</div>`;
        showS(h);
    }

    // الأقسام الأخرى (سنبقيها كما هي حالياً حتى نعدلها قسماً قسماً)
    function openTafseerMenu() { showS("<h2>قسم التفسير</h2><p>سيتم تعديله في الخطوة القادمة...</p>"); }
    function openWahidStory() { showS("<h2>قصة الوحي</h2><p>سيتم تعديلها في الخطوة القادمة...</p>"); }
    function openSahaba() { showS("<h2>مواقف الصحابة</h2>"); }
    function openAzkar() { showS("<h2>الأذكار</h2>"); }
    function openPrayers() { showS("<h2>المواقيت</h2>"); }
</script>
</body>
</html>
