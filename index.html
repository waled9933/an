<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موسوعة المؤمن الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f3d2e;
            --gold: #d4af37;
            --light-gold: #f1e5ac;
            --bg: #0b221a;
            --glass: rgba(255, 255, 255, 0.08);
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at top, #1a4d3c, #0b221a);
            color: #fff;
            margin: 0;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        /* الهيدر الأسطوري */
        .header {
            padding: 40px 20px;
            text-align: center;
            background: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            border-bottom: 2px solid var(--gold);
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* شبكة الأيقونات الراقية */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .icon-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            padding: 25px 15px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .icon-card:active {
            transform: scale(0.95);
            background: rgba(212, 175, 55, 0.1);
        }

        .icon-card .emoji {
            font-size: 45px;
            display: block;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }

        .icon-card p {
            margin: 0;
            font-weight: 700;
            font-size: 16px;
            color: var(--light-gold);
        }

        /* قسم المصحف */
        .search-area {
            padding: 0 20px;
            margin-bottom: 20px;
        }
        .search-area input {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            background: rgba(255,255,255,0.9);
            font-family: 'Tajawal';
            font-size: 16px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .sura-card {
            background: #fff;
            color: #333;
            margin: 10px 20px;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 8px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* الميكروفون المتحرك */
        .mic-fab {
            position: fixed;
            bottom: 120px;
            left: 25px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #d4af37, #aa8c2c);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 9999;
            border: 3px solid #fff;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        /* شاشة العرض الكاملة */
        #view-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fdfcf6;
            color: #333;
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .quran-text {
            font-family: 'Amiri', serif;
            font-size: 28px;
            text-align: center;
            line-height: 2.3;
            color: #2c3e50;
            background: #fdf9e7;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #eadcae;
        }

        /* الشريط السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(15, 61, 46, 0.95);
            display: flex;
            padding: 15px 0;
            border-top: 1px solid var(--gold);
            backdrop-filter: blur(10px);
        }
        .nav-btn {
            flex: 1;
            text-align: center;
            color: #aaa;
            font-weight: bold;
            font-size: 14px;
        }
        .nav-btn.active {
            color: var(--gold);
        }
    </style>
</head>
<body>

<div class="mic-fab" onclick="startVoiceSearch()" id="micBtn">🎙️</div>

<div id="view-screen">
    <button onclick="closeScreen()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:15px; font-weight:bold; margin-bottom:20px;">🔙 العودة للرئيسية</button>
    <div id="view-body"></div>
</div>

<div id="tab-quran" class="tab-content active">
    <div class="header">
        <h1>📖 المصحف الشريف</h1>
    </div>
    <div class="search-area">
        <input type="text" id="q-search" placeholder="ابحث عن السورة (مثال: الكهف)..." onkeyup="searchS()">
    </div>
    <div id="sura-list"></div>
</div>

<div id="tab-more" class="tab-content" style="display:none;">
    <div class="header">
        <h1>🕌 الكنوز الإيمانية</h1>
    </div>
    <div class="icon-grid">
        <div class="icon-card" onclick="showIntroFull()">
            <span class="emoji">📜</span>
            <p>قصة الوحي</p>
        </div>
        <div class="icon-card" onclick="showHadithsFull()">
            <span class="emoji">💬</span>
            <p>الأحاديث</p>
        </div>
        <div class="icon-card" onclick="showAzkarTab()">
            <span class="emoji">☀️</span>
            <p>الأذكار</p>
        </div>
        <div class="icon-card" onclick="showTasbih()">
            <span class="emoji">📿</span>
            <p>المسبحة</p>
        </div>
        <div class="icon-card" onclick="showNamesFull()">
            <span class="emoji">✨</span>
            <p>أسماء الله</p>
        </div>
        <div class="icon-card" onclick="showPrayers()">
            <span class="emoji">🕋</span>
            <p>المواقيت</p>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-btn active" onclick="switchT('tab-quran', this)">📖 المصحف</div>
    <div class="nav-btn" onclick="switchT('tab-more', this)">🕌 المكتبة</div>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    function switchT(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        el.classList.add('active');
    }

    function renderS(list) {
        document.getElementById('sura-list').innerHTML = list.map(s => {
            let i = suras.indexOf(s) + 1;
            return `
            <div class="sura-card">
                <div onclick="openSura(${i},'${s}')" style="flex:1; cursor:pointer;">
                    <b style="font-size:18px;">${i}. ${s}</b><br>
                    <small style="color:var(--gold)">📖 قراءة وتفسير</small>
                </div>
                <button onclick="playSura(${i},'${s}')" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:12px; font-weight:bold;">▶️ استماع</button>
            </div>`;
        }).join('');
    }
    renderS(suras);

    function searchS() {
        let v = document.getElementById('q-search').value;
        renderS(suras.filter(s => s.includes(v)));
    }

    function showS(content) {
        document.getElementById('view-body').innerHTML = content;
        document.getElementById('view-screen').style.display = 'block';
    }
    function closeScreen() { document.getElementById('view-screen').style.display = 'none'; window.speechSynthesis.cancel(); }

    // قصة الوحي كاملة
    function showIntroFull() {
        showS(`
            <h2 style="color:var(--primary); text-align:center;">📜 قصة بدء الوحي كاملة</h2>
            <div style="line-height:1.8; font-size:18px;">
                <p><b>البداية:</b> كان النبي ﷺ يحب الخلوة في غار حراء، يذكر الله ويتفكر في ملكوته، حتى جاءه الحق.</p>
                <p><b>اللقاء المهيب:</b> جاءه الملك جبريل وقال له "اقرأ"، فقال النبي "ما أنا بقارئ". فضمه جبريل حتى بلغ منه الجهد، وتكرر ذلك ثلاثاً، ثم قال له: {اقرأ باسم ربك الذي خلق...}.</p>
                <p><b>العودة:</b> عاد النبي يرجف فؤاده لخديجة رضي الله عنها وهو يقول "زملوني زملوني"، فأخبر خديجة بالخبر، فقالت كلمتها الشهيرة: "كلا والله لا يخزيك الله أبداً، إنك لتصل الرحم، وتصدق الحديث...".</p>
                <p><b>البشارة:</b> ذهبت به لخديجة لورقة بن نوفل، فأخبره أن هذا هو "الناموس" الذي نزل على موسى، وأنه سيكون نبياً لهذه الأمة.</p>
            </div>
        `);
    }

    function showHadithsFull() {
        const hs = ["إنما الأعمال بالنيات", "خيركم من تعلم القرآن وعلمه", "الدين النصيحة", "المسلم من سلم المسلمون من لسانه ويده"];
        showS(`<h2 style="text-align:center;">💬 أحاديث نبوية</h2>` + hs.map(h => `<div style="background:#fff; padding:15px; margin:10px 0; border-radius:15px; border-right:5px solid var(--gold); shadow:0 2px 5px rgba(0,0,0,0.1)">قال ﷺ: <b>${h}</b></div>`).join(''));
    }

    async function openSura(id, name) {
        showS("<p style='text-align:center;'>جاري تحميل كلام الله...</p>");
        try {
            const [qR, tR] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${id}`),
                fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.jalalayn`)
            ]);
            const qD = await qR.json(), tD = await tR.json();
            let h = `<h2 style="text-align:center; color:var(--primary);">سورة ${name}</h2><div class="quran-text">`;
            qD.data.ayahs.forEach(a => h += a.text + ` ﴿${a.numberInSurah}﴾ `);
            h += `</div><h3 style="text-align:center; margin-top:30px;">التفسير الميسر</h3>`;
            tD.data.ayahs.forEach(a => h += `<div style="background:#fff; padding:15px; margin-bottom:10px; border-radius:15px; border:1px solid #eee;"><b>آية ${a.numberInSurah}:</b><br>${a.text} <button onclick="spk('${a.text.replace(/'/g,"")}')" style="border:none; background:none; cursor:pointer; font-size:20px;">🔊</button></div>`);
            showS(h);
        } catch(e) { showS("تأكد من اتصالك بالإنترنت"); }
    }

    function spk(t) { window.speechSynthesis.cancel(); let m=new SpeechSynthesisUtterance(t); m.lang='ar-SA'; window.speechSynthesis.speak(m); }
    
    function playSura(id, name) {
        let audio = new Audio(`https://server12.mp3quran.net/maher/${String(id).padStart(3,'0')}.mp3`);
        audio.play();
        alert("بدأ استماع سورة " + name + " بصوت الشيخ ماهر المعيقلي");
    }

    function startVoiceSearch() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ar-SA';
        document.getElementById('micBtn').innerText = "⏳";
        rec.onresult = (e) => {
            let word = e.results[0][0].transcript.replace("سورة","").trim();
            document.getElementById('micBtn').innerText = "🎙️";
            let idx = suras.findIndex(s => s.includes(word));
            if(idx !== -1) { openSura(idx+1, suras[idx]); playSura(idx+1, suras[idx]); }
            else alert("لم أتعرف على السورة: " + word);
        };
        rec.onerror = () => document.getElementById('micBtn').innerText = "🎙️";
        rec.start();
    }

    function showTasbih() {
        showS(`
            <h2 style="text-align:center;">📿 المسبحة الإلكترونية</h2>
            <div style="text-align:center; padding:60px 20px; background:var(--primary); color:white; border-radius:30px; margin-top:30px;" onclick="document.getElementById('cnt').innerText++">
                <p style="font-size:20px;">اضغط في أي مكان للتسبيح</p>
                <h1 id="cnt" style="font-size:100px; margin:20px 0;">0</h1>
                <button onclick="event.stopPropagation(); document.getElementById('cnt').innerText=0" style="padding:10px 30px; border-radius:10px; border:none; background:var(--gold); color:white; font-weight:bold;">تصفير</button>
            </div>
        `);
    }
    
    function showAzkarTab() {
        showS(`
            <h2 style="text-align:center;">☀️ حصن المسلم</h2>
            <div style="background:#fff; padding:20px; border-radius:20px; margin-bottom:15px; border-right:8px solid #f1c40f;"><b>أذكار الصباح:</b> أصبحنا وأصبح الملك لله...</div>
            <div style="background:#fff; padding:20px; border-radius:20px; margin-bottom:15px; border-right:8px solid #34495e;"><b>أذكار المساء:</b> أمسين وأمسى الملك لله...</div>
            <div style="background:#fff; padding:20px; border-radius:20px; margin-bottom:15px; border-right:8px solid #9b59b6;"><b>أذكار النوم:</b> باسمك ربي وضعت جنبي...</div>
        `);
    }

    async function showPrayers() {
        showS("<p style='text-align:center;'>جاري جلب المواقيت لموقعك...</p>");
        try {
            const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5');
            const d = await res.json();
            const t = d.data.timings;
            showS(`
                <h2 style="text-align:center;">🕋 مواقيت الصلاة</h2>
                <div style="background:white; padding:20px; border-radius:20px; font-size:20px;">
                    <p style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:10px;"><span>الفجر</span> <b>${t.Fajr}</b></p>
                    <p style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:10px;"><span>الظهر</span> <b>${t.Dhuhr}</b></p>
                    <p style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:10px;"><span>العصر</span> <b>${t.Asr}</b></p>
                    <p style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:10px;"><span>المغرب</span> <b>${t.Maghrib}</b></p>
                    <p style="display:flex; justify-content:space-between; padding:10px;"><span>العشاء</span> <b>${t.Isha}</b></p>
                </div>
            `);
        } catch(e) { showS("تحتاج اتصال إنترنت للمواقيت."); }
    }

    function showNamesFull() {
        showS(`
            <h2 style="text-align:center;">✨ أسماء الله الحسنى</h2>
            <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;">
                <div style="background:white; padding:10px; border-radius:10px; text-align:center; border:1px solid var(--gold);">الله</div>
                <div style="background:white; padding:10px; border-radius:10px; text-align:center; border:1px solid var(--gold);">الرحمن</div>
                <div style="background:white; padding:10px; border-radius:10px; text-align:center; border:1px solid var(--gold);">الرحيم</div>
                <div style="background:white; padding:10px; border-radius:10px; text-align:center; border:1px solid var(--gold);">الملك</div>
                <div style="background:white; padding:10px; border-radius:10px; text-align:center; border:1px solid var(--gold);">القدوس</div>
                <div style="background:white; padding:10px; border-radius:10px; text-align:center; border:1px solid var(--gold);">السلام</div>
            </div>
            <p style="text-align:center; margin-top:20px; font-size:12px; color:#666;">تم عرض أمثلة، وجارٍ إضافة الـ 99 كاملة...</p>
        `);
    }
</script>

</body>
</html>
