<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موسوعة المسلم الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; --card: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #333; }
        
        .top-bar { background: var(--p); padding: 25px 20px; text-align: center; color: white; border-radius: 0 0 30px 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .icon-item { background: var(--card); padding: 15px 5px; border-radius: 18px; text-align: center; box-shadow: 0 3px 8px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #f0f0f0; }
        .icon-item span { display: block; font-size: 30px; margin-bottom: 5px; }
        .icon-item p { margin: 0; font-size: 12px; font-weight: bold; color: var(--p); }

        .tab-content { display: none; padding: 10px; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border-right: 5px solid var(--p); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        #view-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .back-btn { background: var(--p); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; font-weight: bold; cursor: pointer; }

        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px 0; border-top: 2px solid #eee; z-index: 5000; }
        .nav-btn { flex: 1; text-align: center; color: #777; font-size: 12px; cursor: pointer; }
        .nav-btn.active { color: var(--p); font-weight: bold; }
        .nav-btn b { display: block; font-size: 20px; }
        
        .quran-text { font-family: 'Amiri', serif; font-size: 24px; text-align: center; line-height: 2; background: #fffdf5; padding: 15px; border-radius: 10px; }
        .prayer-time { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="view-screen">
    <button class="back-btn" onclick="closeScreen()">🔙 العودة</button>
    <div id="view-body"></div>
</div>

<div id="tab-quran" class="tab-content active">
    <div class="top-bar"><h2>مصحف الهداية</h2></div>
    <div style="padding:15px;"><input type="text" id="q-search" placeholder="ابحث عن سورة..." onkeyup="searchS()" style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; outline:none;"></div>
    <div id="sura-container"></div>
</div>

<div id="tab-more" class="tab-content">
    <div class="top-bar"><h2>المكتبة الإيمانية</h2></div>
    <div class="icon-grid">
        <div class="icon-item" onclick="showIntro()"><span>📜</span><p>بدء الوحي</p></div>
        <div class="icon-item" onclick="showHadiths()"><span>💬</span><p>أحاديث</p></div>
        <div class="icon-item" onclick="showPrayers()"><span>🕌</span><p>مواقيت</p></div>
        <div class="icon-item" onclick="showNames()"><span>✨</span><p>أسماء الله</p></div>
        <div class="icon-item" onclick="showAzkar('morning')"><span>☀️</span><p>أذكار</p></div>
        <div class="icon-item" onclick="showTasbih()"><span>📿</span><p>المسبحة</p></div>
        <div class="icon-item" onclick="showTopic('iman')"><span>💎</span><p>الإيمان</p></div>
        <div class="icon-item" onclick="showTopic('taqwa')"><span>🛡️</span><p>التقوى</p></div>
        <div class="icon-item" onclick="window.open('https://www.google.com/maps/search/mosque')"><span>📍</span><p>المساجد</p></div>
    </div>
</div>

<div class="nav">
    <div class="nav-btn active" onclick="switchT('tab-quran', this)"><b>📖</b>المصحف</div>
    <div class="nav-btn" onclick="switchT('tab-more', this)"><b>🌟</b>المكتبة</div>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    function switchT(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function renderSuras(list) {
        document.getElementById('sura-container').innerHTML = list.map(s => {
            let i = suras.indexOf(s) + 1;
            return `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div onclick="openSura(${i},'${s}')" style="flex:1;"><b>${i}. ${s}</b><br><small>تفسير ناطق</small></div>
                <button onclick="playSura(${i},'${s}')" style="border:none; background:#f0f0f0; padding:8px; border-radius:8px;">▶️</button>
            </div>`;
        }).join('');
    }
    renderSuras(suras);

    function searchS() {
        let v = document.getElementById('q-search').value;
        renderSuras(suras.filter(s => s.includes(v)));
    }

    // مواقيت الصلاة (API مبسط)
    async function showPrayers() {
        showS("جاري جلب المواقيت...");
        try {
            const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5');
            const data = await res.json();
            const t = data.data.timings;
            let h = `<h2>مواقيت الصلاة</h2><div class='card'>
                <div class='prayer-time'><span>الفجر</span> <b>${t.Fajr}</b></div>
                <div class='prayer-time'><span>الظهر</span> <b>${t.Dhuhr}</b></div>
                <div class='prayer-time'><span>العصر</span> <b>${t.Asr}</b></div>
                <div class='prayer-time'><span>المغرب</span> <b>${t.Maghrib}</b></div>
                <div class='prayer-time'><span>العشاء</span> <b>${t.Isha}</b></div>
            </div>`;
            showS(h);
        } catch(e) { showS("تحتاج إنترنت لعرض المواقيت"); }
    }

    // أسماء الله الحسنى
    function showNames() {
        const names = [
            {n: "الله", m: "الاسم الأقدس المتفرد بالألوهية"},
            {n: "الرحمن", m: "واسع الرحمة بجميع خلقه"},
            {n: "الرحيم", m: "الرحيم بالمؤمنين خاصة"},
            {n: "الملك", m: "المتصرف في ملكه كما يشاء"},
            {n: "القدوس", m: "المنزه عن كل نقص"},
            {n: "السلام", m: "ناشر السلام بين الأنام"}
        ]; // تم الاختصار هنا للمساحة، يمكنك إضافة الـ 99 كاملة بنفس النمط
        showS("<h2>أسماء الله الحسنى</h2>" + names.map(x => `<div class='card'><b>${x.n}</b>: ${x.m}</div>`).join(''));
    }

    // قصة بدء الوحي
    function showIntro() {
        showS(`<h2>قصة بدء الوحي</h2><p class='card'>بدأ الأمر برؤيا صادقة، ثم التحنث في غار حراء. نزل جبريل وقال: "اقرأ"، قال النبي: "ما أنا بقارئ".. حتى نزلت {اقرأ باسم ربك الذي خلق}. رجع النبي يرتجف لخديجة قائلاً: "زملوني زملوني".. وطمأنته قائلة: "كلا والله لا يخزيك الله أبداً".</p>`);
    }

    function showHadiths() {
        const h = ["إنما الأعمال بالنيات", "خيركم من تعلم القرآن وعلمه", "الدين النصيحة", "من صمت نجا"];
        showS("<h2>أحاديث نبوية</h2>" + h.map(x => `<div class='card'> قال ﷺ: ${x}</div>`).join(''));
    }

    function showAzkar(type) {
        const az = ["سبحان الله (33)", "الحمد لله (33)", "الله أكبر (34)", "لا إله إلا الله"];
        showS("<h2>أذكار المسلم</h2>" + az.map(z => `<div class='card' onclick='this.style.opacity=0.5'>${z}</div>`).join(''));
    }

    function showTasbih() {
        showS(`<h2>المسبحة</h2><div style="text-align:center; padding:40px; background:var(--p); color:white; border-radius:20px;" onclick="document.getElementById('cc').innerText++">
            <h1 id="cc" style="font-size:70px;">0</h1><p>اضغط للعد</p>
            <button onclick="event.stopPropagation(); document.getElementById('cc').innerText=0">تصفير</button>
        </div>`);
    }

    function showTopic(key) {
        const t = {iman:"الإيمان هو اعتقاد بالقلب وقول باللسان", taqwa:"التقوى هي وقاية النفس من عذاب الله"};
        showS(`<h2>${key==='iman'?'الإيمان':'التقوى'}</h2><p class='card'>${t[key]}</p>`);
    }

    function showS(content) { document.getElementById('view-body').innerHTML = content; document.getElementById('view-screen').style.display='block'; }
    function closeScreen() { document.getElementById('view-screen').style.display='none'; window.speechSynthesis.cancel(); }
    
    function playSura(id, name) { 
        let a = new Audio(`https://server12.mp3quran.net/maher/${String(id).padStart(3,'0')}.mp3`);
        a.play(); alert("تشغيل سورة " + name); 
    }

    async function openSura(id, name) {
        showS("جاري التحميل...");
        try {
            const [qR, tR] = await Promise.all([
                fetch(`https://api.alquran.cloud/v1/surah/${id}`),
                fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.jalalayn`)
            ]);
            const qD = await qR.json(), tD = await tR.json();
            let h = `<h2>سورة ${name}</h2><div class="quran-text">${qD.data.ayahs.map(a=>a.text+` [${a.numberInSurah}]`).join(' ')}</div>`;
            tD.data.ayahs.forEach(a => h += `<div class='card'><b>تفسير ${a.numberInSurah}:</b><br>${a.text} <button onclick="spk('${a.text.replace(/'/g,"")}')">🔊</button></div>`);
            showS(h);
        } catch(e) { showS("خطأ اتصال"); }
    }
    function spk(t) { window.speechSynthesis.cancel(); let m=new SpeechSynthesisUtterance(t); m.lang='ar-SA'; window.speechSynthesis.speak(m); }
</script>
</body>
</html>
