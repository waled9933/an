<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق وليد - المصحف والشيخ الروبوت</title>
    <style>
        body { font-family: 'Amiri', serif; background: #fdfcf9; margin: 0; padding-bottom: 70px; }
        header { background: #1b5e20; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { padding: 15px; }
        .surah-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .surah-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; text-align: center; border: 1px solid #e0e0e0; font-weight: bold; color: #1b5e20; }
        
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 200; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .back-btn { background: #c62828; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; font-size: 16px; }
        .ayah { font-size: 26px; line-height: 2.2; text-align: center; border-bottom: 1px solid #eee; padding: 15px; }

        #chat-ui { position: fixed; bottom: 80px; left: 20px; width: 300px; height: 400px; background: white; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 5px 25px rgba(0,0,0,0.3); z-index: 300; border: 2px solid #1b5e20; overflow: hidden; }
        .chat-body { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; font-size: 14px; text-align: right; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #ddd; background: white; }
        .chat-input input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 5px; outline: none; }
        #bot-toggle { position: fixed; bottom: 20px; left: 20px; background: #ff9800; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; z-index: 400; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 3px solid white; }
    </style>
</head>
<body>

<header>
    <h1>تطبيق وليد الشامل</h1>
    <p>المصحف كامل 📖 والشيخ الروبوت 🤖</p>
</header>

<div class="container" id="main-menu">
    <div class="surah-grid" id="surah-list">
        </div>
</div>

<div id="reader">
    <button class="back-btn" onclick="closeReader()">⬅️ إغلاق المصحف</button>
    <div id="quran-text"></div>
</div>

<div id="bot-toggle" onclick="toggleChat()">🤖</div>

<div id="chat-ui">
    <div style="background:#1b5e20; color:white; padding:12px; text-align:center; font-weight:bold;">الشيخ الروبوت (مساعد وليد)</div>
    <div class="chat-body" id="chat-msgs">
        <div style="background:#e8f5e9; padding:8px; border-radius:8px; margin-bottom:10px;">أهلاً يا وليد! أنا خادمك الذكي، اسألني أي سؤال عن الدين أو القرآن وسأجيبك فوراً.</div>
    </div>
    <div class="chat-input">
        <input type="text" id="user-msg" placeholder="اكتب سؤالك هنا...">
        <button onclick="botReply()" style="background:#1b5e20; color:white; border:none; padding:10px; border-radius:5px; margin-right:5px; cursor:pointer;">إرسال</button>
    </div>
</div>

<script>
    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    const listDiv = document.getElementById('surah-list');
    surahNames.forEach((name, index) => {
        listDiv.innerHTML += `<div class="surah-card" onclick="loadSurah(${index + 1})">${index + 1}. ${name}</div>`;
    });

    async function loadSurah(id) {
        const textDiv = document.getElementById('quran-text');
        textDiv.innerHTML = "<h2 style='text-align:center;'>جاري تحميل السورة...</h2>";
        document.getElementById('reader').style.display = 'block';
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            let html = `<h2 style='text-align:center; color:#1b5e20;'>${data.data.name}</h2>`;
            data.data.ayahs.forEach(a => { html += `<div class="ayah">${a.text} ﴿${a.numberInSurah}﴾</div>`; });
            textDiv.innerHTML = html;
        } catch(e) { textDiv.innerHTML = "تأكد من اتصالك بالإنترنت."; }
    }

    function closeReader() { document.getElementById('reader').style.display = 'none'; }
    function toggleChat() { 
        const ui = document.getElementById('chat-ui');
        ui.style.display = (ui.style.display === 'flex') ? 'none' : 'flex';
    }

    function botReply() {
        const input = document.getElementById('user-msg');
        const msgs = document.getElementById('chat-msgs');
        if(!input.value) return;

        msgs.innerHTML += `<div style="text-align:left; margin-bottom:10px;"><span style="background:#ddd; padding:8px; border-radius:8px;">${input.value}</span></div>`;
        
        const text = input.value;
        input.value = "";

        setTimeout(() => {
            let reply = "بصفتي الروبوت المساعد لوليد، أقول لك: " + (text.length > 3 ? "سؤالك ذكي جداً، جاري البحث في المراجع الدينية للرد عليك." : "أهلاً بك، أنا أسمعك جيداً.");
            if(text.includes("سلام")) reply = "وعليكم السلام يا وليد، كيف حالك اليوم؟";
            if(text.includes("قرآن")) reply = "المصحف كامل بين يديك الآن، اختر السورة وابدأ القراءة.";
            
            msgs.innerHTML += `<div style="text-align:right; margin-bottom:10px;"><span style="background:#1b5e20; color:white; padding:8px; border-radius:8px;">${reply}</span></div>`;
            msgs.scrollTop = msgs.scrollHeight;
        }, 600);
    }
</script>
</body>
</html>
