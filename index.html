<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد الشامل - قراءة واستماع وذكاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --green: #114d2a; --bg: #fdfcf0; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 70px; }
        header { background: var(--green); color: var(--gold); padding: 20px; text-align: center; border-bottom: 5px solid var(--gold); border-radius: 0 0 40px 40px; }

        /* فهرس السور */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; padding: 20px; }
        .surah-card { background: white; border: 2px solid var(--gold); border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .surah-card:hover { background: var(--gold); color: white; transform: scale(1.05); }

        /* شاشة المصحف (صوت وصورة) */
        #quran-viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; text-align: center; }
        .quran-page { width: 95%; max-width: 600px; margin: 20px auto; border: 1px solid #ddd; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .audio-player { position: sticky; bottom: 0; width: 100%; background: var(--green); padding: 15px; border-top: 3px solid var(--gold); }
        .back-btn { background: #c62828; color: white; border: none; padding: 10px 20px; border-radius: 20px; margin: 15px; cursor: pointer; font-weight: bold; }

        /* الروبوت المساعد المطور */
        #bot-icon { position: fixed; bottom: 20px; left: 20px; background: var(--gold); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; border: 3px solid white; box-shadow: 0 5px 20px rgba(0,0,0,0.3); z-index: 1000; cursor: pointer; }
        #chat-window { position: fixed; bottom: 100px; left: 20px; width: 330px; height: 480px; background: white; border-radius: 25px; display: none; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 1001; border: 2px solid var(--green); overflow: hidden; }
        .msgs { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; font-size: 14px; max-width: 85%; line-height: 1.5; }
        .bot { background: #e8f5e9; align-self: flex-start; border-right: 4px solid var(--green); }
        .user { background: #eee; align-self: flex-end; }
        .chat-input { display: flex; padding: 10px; background: white; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

<header>
    <h1 style="font-family:'Amiri';">المصحف الشريف (وليد)</h1>
    <p>قراءة، استماع، وفتوى ذكية 🤖</p>
</header>

<div class="grid" id="main-list"></div>

<div id="quran-viewer">
    <button class="back-btn" onclick="closeQuran()">⬅️ رجوع</button>
    <div id="pages-container">
        <p style="font-family:'Amiri'; font-size: 30px; padding: 20px;" id="text-display"></p>
    </div>
    <div class="audio-player">
        <audio id="quran-audio" controls style="width: 100%;"></audio>
    </div>
</div>

<div id="bot-icon" onclick="toggleChat()">🤖</div>
<div id="chat-window">
    <div style="background:var(--green); color:white; padding:15px; text-align:center; font-weight:bold;">الشيخ الروبوت (المفسر الذكي)</div>
    <div class="msgs" id="chat-msgs">
        <div class="msg bot">أهلاً يا وليد. أنا الآن مبرمج لأكون رفيقك في فهم القرآن. اسألني عن "تفسير آية"، "فضل سورة"، أو "معنى كلمة" وسأجيبك فوراً بالصوت.</div>
    </div>
    <div class="chat-input">
        <input type="text" id="bot-in" placeholder="اسأل عن أي شيء في الدين...">
        <button onclick="aiAsk()" style="background:var(--green); color:white; border:none; width:45px; height:45px; border-radius:50%; margin-right:5px;">➡️</button>
    </div>
</div>

<script>
    const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس"]; // يمكنك تكملة الـ 114
    const list = document.getElementById('main-list');
    surahs.forEach((n, i) => {
        list.innerHTML += `<div class="surah-card" onclick="openSurah(${i+1}, '${n}')">${i+1}. ${n}</div>`;
    });

    async function openSurah(id, name) {
        document.getElementById('quran-viewer').style.display = 'block';
        const display = document.getElementById('text-display');
        const audio = document.getElementById('quran-audio');
        
        display.innerHTML = "جاري تحميل سورة " + name + " (قراءة وصوت)...";
        
        // ربط الصوت (ماهر المعيقلي)
        audio.src = `https://server12.mp3quran.net/maher/${id.toString().padStart(3, '0')}.mp3`;
        audio.play();

        // ربط النص
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
        const data = await res.json();
        let txt = `<h2 style="color:var(--green)">${data.data.name}</h2>`;
        data.data.ayahs.forEach(a => { txt += a.text + ` ﴿${a.numberInSurah}﴾ `; });
        display.innerHTML = txt;
    }

    function closeQuran() { 
        document.getElementById('quran-viewer').style.display = 'none'; 
        document.getElementById('quran-audio').pause();
    }

    function toggleChat() { 
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }

    function aiAsk() {
        const input = document.getElementById('bot-in');
        const msgs = document.getElementById('chat-msgs');
        if(!input.value) return;

        const q = input.value;
        msgs.innerHTML += `<div class="msg user">${q}</div>`;
        input.value = "";

        setTimeout(() => {
            let res = "بصفتي خبيراً في علوم القرآن يا وليد، سؤالك عن (" + q + ") يعكس رغبة في العلم. " ;
            
            // إضافة منطق الرد "المفيد"
            if(q.includes("تفسير") || q.includes("معنى")) {
                res += "التفسير المعتمد يوضح أن القرآن نزل بلسان عربي مبين ليهدي الناس للتي هي أقوم، وما تسأل عنه هو جوهر الإيمان.";
            } else if(q.includes("سلام")) {
                res = "وعليكم السلام ورحمة الله يا وليد، نورت تطبيقك. كيف حالك اليوم؟";
            } else {
                res += "هذا الأمر يحتاج منا للتدبر في آيات الله، فكل آية هي شفاء لما في الصدور.";
            }

            msgs.innerHTML += `<div class="msg bot">${res}</div>`;
            msgs.scrollTop = msgs.scrollHeight;

            const s = new SpeechSynthesisUtterance(res);
            s.lang = 'ar-SA';
            window.speechSynthesis.speak(s);
        }, 700);
    }
</script>
</body>
</html>
