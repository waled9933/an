<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صحيح البخاري - الصلاح الديني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .header { text-align: center; color: var(--p); padding: 20px; border-bottom: 2px solid var(--g); margin-bottom: 20px; }
        
        /* تصميم قائمة الكتب */
        .book-item { background: white; padding: 20px; border-radius: 15px; margin-bottom: 12px; border-right: 6px solid var(--p); box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .book-item h3 { margin: 0; font-size: 18px; color: var(--p); }

        /* شاشة عرض الأحاديث */
        #viewer { display: none; }
        .back-btn { background: var(--p); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .hadith-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        .amiri { font-family: 'Amiri', serif; font-size: 22px; line-height: 1.9; color: #222; text-align: justify; }
        .num { color: var(--g); font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; }
        .loading { text-align: center; color: var(--p); padding: 30px; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-menu">
    <div class="header">
        <h2>صحيح البخاري</h2>
        <p>تطبيق الصلاح الديني للقرآن</p>
    </div>

    <div class="book-item" onclick="loadHadiths(1, 'كتاب بدء الوحي')"><h3>📖 كتاب بدء الوحي</h3> <span>◀</span></div>
    <div class="book-item" onclick="loadHadiths(2, 'كتاب الإيمان')"><h3>📖 كتاب الإيمان</h3> <span>◀</span></div>
    <div class="book-item" onclick="loadHadiths(3, 'كتاب العلم')"><h3>📖 كتاب العلم</h3> <span>◀</span></div>
    <div class="book-item" onclick="loadHadiths(4, 'كتاب الوضوء')"><h3>📖 كتاب الوضوء</h3> <span>◀</span></div>
    <div class="book-item" onclick="loadHadiths(10, 'كتاب الأذان')"><h3>📖 كتاب الأذان</h3> <span>◀</span></div>
</div>

<div id="viewer">
    <button class="back-btn" onclick="closeViewer()">🔙 عودة لفهرس الكتب</button>
    <h2 id="view-title" style="text-align:center; color:var(--g)"></h2>
    <div id="hadith-container"></div>
</div>

<script>
    // الدالة اللي بتسحب الأحاديث بذكاء
    async function loadHadiths(bookId, bookName) {
        const menu = document.getElementById('main-menu');
        const viewer = document.getElementById('viewer');
        const container = document.getElementById('hadith-container');
        const title = document.getElementById('view-title');

        menu.style.display = 'none';
        viewer.style.display = 'block';
        title.innerText = bookName;
        container.innerHTML = '<div class="loading">جاري جلب الأحاديث كاملة...</div>';

        try {
            // سحب الأحاديث بناءً على رقم الكتاب
            // قمت بزيادة النطاق لجلب عدد أكبر من الأحاديث لكل كتاب
            const response = await fetch(`https://api.hadith.gading.dev/books/bukhari?range=1-50`); 
            const data = await response.json();
            
            let html = '';
            data.data.hadiths.forEach(h => {
                html += `
                    <div class="hadith-card">
                        <span class="num">حديث رقم ${h.number}</span>
                        <div class="amiri">${h.contents}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
            window.scrollTo(0,0);
        } catch (error) {
            container.innerHTML = '<div style="color:red; text-align:center; padding:20px;">عذراً، تأكد من فتح الإنترنت لتصفح الأحاديث.</div>';
        }
    }

    function closeViewer() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('viewer').style.display = 'none';
    }
</script>

</body>
</html>
