<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصلاح الديني للقرآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        .top { background: var(--p); height: 160px; border-radius: 0 0 40px 40px; padding: 20px; color: white; text-align: center; }
        .card { background: linear-gradient(135deg, #f3e5ab 0%, #c5a059 100%); margin: -80px 20px 20px; border-radius: 25px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid #fff; display: flex; justify-content: space-between; align-items: center; }
        
        .s-card { background: white; padding: 18px; border-radius: 15px; margin: 10px 20px; border-right: 6px solid var(--p); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }
        .s-card:active { transform: scale(0.98); }
        .s-info { display: flex; align-items: center; gap: 15px; }
        .s-num { background: var(--bg); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--p); }

        .player-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--p); padding: 15px; border-top: 3px solid var(--g); box-sizing: border-box; }
        audio { width: 100%; height: 45px; }
        .now-playing { color: white; text-align: center; font-size: 14px; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="top">
    <h2 style="margin:0;">الصلاح الديني للقرآن</h2>
    <p style="font-size:14px; opacity:0.8;">القرآن الكريم كاملاً</p>
</div>

<div class="card">
    <div>
        <div style="font-size:14px; color:#5a461b;">القارئ الحالي</div>
        <div style="font-size:24px; font-weight:bold;">ماهر المعيقلي</div>
    </div>
    <div style="font-size:50px;">🎙️</div>
</div>

<div id="surah-list">
    </div>

<div class="player-footer" id="audio-box" style="display:none;">
    <div class="now-playing" id="sura-label"></div>
    <audio id="main-audio" controls autoplay></audio>
</div>

<script>
    const surahs = [
        "الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف"
    ];

    const listContainer = document.getElementById('surah-list');
    surahs.forEach((name, index) => {
        const id = index + 1;
        listContainer.innerHTML += `
            <div class="s-card" onclick="playSura(${id}, '${name}')">
                <div class="s-info">
                    <div class="s-num">${id}</div>
                    <div style="font-weight:bold; font-size:18px;">سورة ${name}</div>
                </div>
                <div style="color:var(--g); font-size:20px;">▶</div>
            </div>
        `;
    });

    function playSura(id, name) {
        const audio = document.getElementById('main-audio');
        const audioBox = document.getElementById('audio-box');
        const label = document.getElementById('sura-label');
        
        // رابط سيرفر الشيخ ماهر المعيقلي الموثوق
        const suraNum = String(id).padStart(3, '0');
        audio.src = `https://server12.mp3quran.net/maher/${suraNum}.mp3`;
        
        audioBox.style.display = 'block';
        label.innerText = "جاري تشغيل: سورة " + name;
        audio.play();
    }
</script>

</body>
</html>
