<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>تطبيق وليد للقرآن</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --green: #1b5e20; --white: #ffffff; }
        body { font-family: 'Tajawal', sans-serif; background: #f0f0f0; margin: 0; padding-bottom: 80px; }
        
        /* تصميم الهيدر زي الصورة اللي بعتها */
        header { background: var(--green); color: var(--gold); padding: 30px 10px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border-bottom: 4px solid var(--gold); }
        
        .container { padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--white); padding: 25px 10px; border-radius: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid var(--gold); cursor: pointer; transition: 0.3s; color: var(--green); font-weight: bold; font-size: 18px; }
        .card:active { transform: scale(0.9); background: #f9f9f9; }

        /* شاشة القراءة */
        #quran-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .q-text { font-size: 28px; line-height: 2.2; text-align: center; color: #222; margin-top: 20px; }
        .close-q { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; }

        /* بوت وليد الذكي */
        #bot-icon { position: fixed; bottom: 25px; left: 25px; background: var(--gold); width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 4px solid var(--white); z-index: 1000; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }

        #chat-box { position: fixed; bottom: 110px; left: 20px; width: 85%; max-width: 350px; height: 450px; background: white; border-radius: 25px; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1001; border: 3px solid var(--green); overflow: hidden; }
    </style>
</head>
<body>

<header>
    <img src="https://cdn-icons-png.flaticon.com/512/2904/2904831.png" width="80" alt="logo">
    <h1>تطبيق القرآن الكريم</h1>
    <p>برمجة وليد الذكية</p>
</header>

<div class="container" id="surah-grid">
    </div>

<div id="bot-icon" onclick="toggleChat()">🤖</div>

<div id="chat-box">
    <div style="background:var(--green); color:white; padding:15px; text-align:center; font-weight:bold;">الشيخ الروبوت (مساعد وليد)</div>
    <div id="msgs" style="flex:1; padding:15px; overflow-y:auto; background:#f9f9f9;">
        <div style="background:#e8f5e9; padding:10px; border-radius:12px; margin-bottom:10px;">أهلاً يا مبرمج وليد! أنا الروبوت الذكي، جاهز أرد عليك بالصوت والكتابة. اسألني أي حاجة.</div>
    </div>
    <div style="display:flex; padding:10px; border-top:1px solid #ddd;">
        <input type="text" id="bot-in" style="flex:1; border:1px solid #ddd; padding:10px; border-radius:20px; outline:none;" placeholder="اكتب سؤالك...">
        <button onclick="askBot()" style="background:var(--green); color:white; border:none; padding:10px 15px; border-radius:50%; margin-right:5px;">➡️</button>
    </div>
</div>

<div id="quran-screen">
    <button class="close-q" onclick="closeQuran()">❌ رجوع للقائمة</button>
    <div id="q-content" class="q-text"></div>
</div>

<script>
    const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    const grid = document.getElementById('surah-grid');
    surahs.forEach((s, i) => {
        grid.innerHTML += `<div class="card" onclick="openS(${i+1},'${s}')">${s}</div>`;
    });

    async function openS(id, name) {
        const c = document.getElementById('q-content');
        c.innerHTML = "جاري تحميل سورة " + name + "...";
        document.getElementById('quran-screen').style.display = 'block';
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
        const d = await res.json();
        let txt = `<h2>${d.data.name}</h2>`;
        d.data.ayahs.forEach(a => { txt += a.text + ` ﴿${a.numberInSurah}﴾ `; });
        c.innerHTML = txt;
    }

    function closeQuran() { document.getElementById('quran-screen').style.display = 'none'; }
    function toggleChat() { 
        const b = document.getElementById('chat-box');
        b.style.display = (b.style.display==='flex') ? 'none' : 'flex';
    }

    function askBot() {
        const i = document.getElementById('bot-in');
        const m = document.getElementById('msgs');
        if(!i.value) return;
        m.innerHTML += `<div style="text-align:left; margin:10px 0;"><span style="background:#ddd; padding:10px; border-radius:15px;">${i.value}</span></div>`;
        const val = i.value; i.value = "";
        
        setTimeout(() => {
            let reply = "بصفتي مساعدك الذكي يا وليد، أقول لك أن " + val + " موضوع مهم سأشرحه لك بالصوت الآن.";
            if(val.includes("سلام")) reply = "وعليكم السلام يا مبرمج وليد! نورت تطبيقك الحقيقي.";
            
            m.innerHTML += `<div style="text-align:right; margin:10px 0;"><span style="background:var(--green); color:white; padding:10px; border-radius:15px;">${reply}</span></div>`;
            m.scrollTop = m.scrollHeight;

            const speak = new SpeechSynthesisUtterance(reply);
            speak.lang = 'ar-SA';
            window.speechSynthesis.speak(speak);
        }, 600);
    }
</script>
</body>
</html>
