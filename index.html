<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .play-btn { background: #00796b; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; margin: 10px 0; font-weight: bold; font-size: 18px; }
        #audio-container { display: none; margin-top: 20px; background: #e0f2f1; padding: 15px; border-radius: 10px; }
        audio { width: 100%; }
        #msg { color: #555; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#004d40">الصلاح الديني - اختبار الصوت</h2>
    <p>اضغط لتجربة "قصة التفسير":</p>
    
    <button class="play-btn" onclick="runAudio('001', 'الفاتحة')">▶️ تشغيل سورة الفاتحة</button>
    <button class="play-btn" onclick="runAudio('112', 'الإخلاص')">▶️ تشغيل سورة الإخلاص</button>

    <div id="audio-container">
        <b id="s-name"></b>
        <audio id="player" controls autoplay></audio>
        <div id="msg">انتظر ثواني للتحميل...</div>
    </div>
</div>

<script>
    function runAudio(id, name) {
        const player = document.getElementById('player');
        const container = document.getElementById('audio-container');
        const msg = document.getElementById('msg');
        const sName = document.getElementById('s-name');

        container.style.display = 'block';
        sName.innerText = "سورة " + name;
        msg.innerText = "جاري محاولة الاتصال بالسيرفر...";

        // تغيير الرابط ليكون مباشر أكثر وتجنب الحظر
        const fileUrl = `https://archive.org/download/Tafsir_Moyassar_Audio/${id}.mp3`;
        player.src = fileUrl;

        player.onplay = () => { msg.innerText = "✅ شغال الآن بجودة عالية"; };
        
        player.onerror = () => {
            msg.innerText = "⚠️ مشكلة في السيرفر، جاري المحاولة من رابط احتياطي...";
            // رابط احتياطي من سيرفر مختلف تماماً
            player.src = `https://server14.mp3quran.net/s_hkm/${id}.mp3`;
        };
    }
</script>

</body>
</html>
