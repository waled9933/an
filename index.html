<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق القرآن والأدعية</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 70px; text-align: center; }
        header { background: #2d5a27; color: white; padding: 15px; position: sticky; top: 0; }
        .card { background: white; margin: 10px; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { cursor: pointer; color: #777; font-size: 14px; }
        #ai-btn { position: fixed; bottom: 80px; left: 20px; cursor: pointer; background: #2d5a27; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <header><h1>تطبيق المسلم الشامل</h1></header>
    <div class="card"><h3>قسم القرآن الكريم</h3><p>قريباً سيتم إضافة جميع السور...</p></div>
    <div class="card"><h3>قسم الأدعية</h3><p>"اللهم اشرح لي صدري ويسر لي أمري"</p></div>
    
    <div id="ai-btn" onclick="alert('أهلاً بك! أنا الشيخ الروبوت، اسألني ما شئت وسأجيبك فوراً.')">🤖</div>

    <div class="nav-bar">
        <div class="nav-item">📖 قرآن</div>
        <div class="nav-item">🤲 أدعية</div>
        <div class="nav-item">🖼️ خلفيات</div>
    </div>
</body>
</html>
