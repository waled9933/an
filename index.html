<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صحيح البخاري - الصلاح الديني</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .back-btn { background: var(--p); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 20px; display: block; width: 100%; }
        .header { text-align: center; color: var(--p); margin-bottom: 25px; border-bottom: 2px solid var(--g); padding-bottom: 10px; }
        
        /* قائمة الكتب */
        .books-list { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .book-card { background: white; padding: 20px; border-radius: 15px; border-right: 6px solid var(--p); box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .book-card:active { transform: scale(0.98); background: #f9f9f9; }
        .book-card h3 { margin: 0; font-size: 18px; color: var(--p); }

        /* عرض الأحاديث */
        #hadith-display { display: none; }
        .hadith-item { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .hadith-number { color: var(--g); font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; }
        .amiri { font-family: 'Amiri', serif; font-size: 22px; line-height: 1.9; color: #222; text-align: justify; }
        .loading { text-align: center; color: var(--p); font-weight: bold; padding: 50px; }
    </style>
</head>
<body>

<div id="main-view">
    <div class="header">
        <h2>صحيح البخاري كاملاً</h2>
        <p>موسوعة الصلاح الديني للقرآن</p>
    </div>

    <div class="books-list">
        <div class="book-card" onclick="loadHadiths(1, 'كتاب بدء الوحي')"><h3>📖 كتاب بدء الوحي</h3> <span>◀</span></div>
        <div class="book-card" onclick="loadHadiths(2, 'كتاب الإيمان')"><h3>📖 كتاب الإيمان</h3> <span>◀</span></div>
        <div class="book-card" onclick="loadHadiths(3, 'كتاب العلم')"><h3>📖 كتاب العلم</h3> <span>◀</span></div>
        <div class="book-card" onclick="loadHadiths(4, 'كتاب الوضوء')"><h3>📖 كتاب الوضوء</h3> <span>◀</span></div>
        <div class="book-card" onclick="loadHadiths(10, 'كتاب الأذان')"><h3>📖 كتاب الأذان</h3> <span>◀</span></div>
        <div class="book-card" onclick="loadHadiths(24, 'كتاب الزكاة')"><h3>📖 كتاب الزكاة</h3> <span>◀</span></div>
    </div>
</div>

<div id="hadith-display">
    <button class="back-btn" onclick="goBack()">🔙 العودة لفهرس الكتب</button>
    <h2 id="current-book-title" style="text-align:center; color:var(--g);"></h2>
    <div id="hadiths-container"></div>
</div>

<script>
    // دالة سحب الأحاديث من الـ API العالمي
    async function loadHadiths(bookId, bookName) {
        const container = document.getElementById('hadiths-container');
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('hadith-display').style.display = 'block';
        document.getElementById('current-book-title').innerText = bookName;
        
        container.innerHTML = '<div class="loading">جاري سحب الأحاديث من المكتبة الشاملة...</div>';

        try {
            // الربط بـ API الأحاديث (بخاري)
            const response = await fetch(`https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1/editions/ara-buchari/sections/${bookId}.json`);
            const data = await response.json();
            
            let html = '';
            data.hadiths.forEach((h, index) => {
                html += `
                    <div class="hadith-item">
                        <span class="hadith-number">حديث رقم: ${index + 1}</span>
                        <div class="amiri">${h.text}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch (error) {
            container.innerHTML = '<div style="color:red; text-align:center;">عذراً، حدث خطأ في الاتصال بالمكتبة. تأكد من إنترنت الموبايل.</div>';
        }
    }

    function goBack() {
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('hadith-display').style.display = 'none';
    }
</script>

</body>
</html>
