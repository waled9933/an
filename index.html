<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصحف وليد PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        .top { background: var(--p); height: 160px; border-radius: 0 0 40px 40px; padding: 20px; color: white; text-align: center; }
        .card { background: linear-gradient(135deg, #f3e5ab 0%, #c5a059 100%); margin: -80px 20px 20px; border-radius: 25px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid #fff; display: flex; justify-content: space-between; align-items: center; }
        .time { font-size: 40px; font-weight: bold; color: #3a2d0d; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px 20px; }
        .item { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; font-weight: bold; color: #444; }
        .icon { width: 55px; height: 55px; background: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* قائمة السور */
        .q-list { padding: 20px; }
        .s-card { background: white; padding: 18px; border-radius: 15px; margin-bottom: 12px; border-right: 6px solid var(--p); box-shadow: 0 4px 6px rgba(0,0,0,0.02); display: flex; justify-content: space-between; cursor: pointer; }
        
        /* شاشة عرض الآيات */
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .ayat-text { font-family: 'Amiri', serif; font-size: 26px; line-height: 2.2; text-align: justify; margin-top: 20px; }

        /* مشغل الصوت */
        .player { position: fixed; bottom: 80px; left: 5%; width: 90%; background: var(--p); color: white; padding: 12px; border-radius: 15px; display: none; align-items: center; gap: 10px; z-index: 1000; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; height: 70px; display: flex; border-top: 1px solid #eee; z-index: 1001; }
        .n-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 10px; }
        .active { color: var(--p); font-weight: bold; }
    </style>
</head>
<body>

<div id="home">
    <div class="top">
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <span>📍 القاهرة، مصر</span>
            <span>21 رمضان، 1447 هـ</span>
        </div>
    </div>
    <div class="card">
        <div>
            <div style="font-size:14px; color:#5a461b;">الصلاة القادمة: الفجر</div>
            <div class="time">04:42</div>
        </div>
        <div style="font-size:60px;">🕌</div>
    </div>
    <div class="grid">
        <div class="item"><div class="icon">📖</div><span>القرآن</span></div>
        <div class="item"><div class="icon">🤲</div><span>الأذكار</span></div>
        <div class="item"><div class="icon">🧭</div><span>القبلة</span></div>
        <div class="item"><div class="icon">📿</div><span>السبحة</span></div>
    </div>
    <div class="q-list" id="surah-container">
        </div>
</div>

<div id="reader">
    <button onclick="closeReader()" style="background:var(--g); border:none; padding:10px 20px; border-radius:10px; color:white; font-weight:bold;">🔙 رجوع</button>
    <h2 id="sura-title" style="text-align:center; color:var(--p)"></h2>
    <div id="ayat-content" class="ayat-text">جاري تحميل الآيات...</div>
</div>

<div class="player" id="audio-player">
    <button onclick="toggleAudio()" id="play-btn" style="background:var(--g); border:none; border-radius:50%; width:40px; height:40px; color:white;">⏸</button>
    <div style="flex:1">
        <div id="p-name" style="font-size:14px; font-weight:bold;"></div>
        <div style="font-size:10px; opacity:0.8;">الشيخ محمد صديق المنشاوي</div>
    </div>
</div>

<div class="nav">
    <div class="n-btn active">🏠<br>الرئيسية</div>
    <div class="n-btn">🕌<br>الصلاة</div>
    <div class="n-btn">🌍<br>الأمة</div>
    <div class="n-btn">💬<br>الرسائل</div>
    <div class="n-btn">👤<br>أنا</div>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
    let audio = new Audio();

    // إظهار قائمة السور كاملة
    const container = document.getElementById('surah-container');
    container.innerHTML = suras.map((s, i) => `
        <div class="s-card" onclick="openSurah(${i+1}, '${s}')">
            <span>${i+1}. ${s}</span>
            <span style="color:var(--g)">▶</span>
        </div>
    `).join('');

    async function openSurah(id, name) {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('sura-title').innerText = "سورة " + name;
        document.getElementById('ayat-content').innerText = "جاري تحميل الآيات...";
        
        // تشغيل الصوت
        const audioId = String(id).padStart(3, '0');
        audio.src = `https://server8.mp3quran.net/minsh/mjw/${audioId}.mp3`;
        audio.play();
        
        document.getElementById('audio-player').style.display = 'flex';
        document.getElementById('p-name').innerText = "سورة " + name;

        // جلب الآيات كاملة
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
            const data = await res.json();
            const text = data.data.ayahs.map(a => a.text + ` ﴿${a.numberInSurah}﴾`).join(" ");
            document.getElementById('ayat-content').innerText = text;
        } catch(e) {
            document.getElementById('ayat-content').innerText = "تأكد من اتصالك بالإنترنت لتحميل الآيات.";
        }
    }

    function closeReader() { document.getElementById('reader').style.display = 'none'; }
    
    function toggleAudio() {
        if(audio.paused) { audio.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('play-btn').innerText = "▶"; }
    }
</script>

</body>
</html>
