<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الصلاح الديني للقرآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .top { background: var(--p); height: 140px; border-radius: 0 0 35px 35px; padding: 20px; color: white; text-align: center; }
        .card { background: linear-gradient(135deg, #f3e5ab 0%, #c5a059 100%); margin: -60px 20px 20px; border-radius: 20px; padding: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); border: 2px solid #fff; display: flex; justify-content: space-between; align-items: center; }
        .q-list { padding: 0 15px; }
        .s-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid var(--p); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        #content-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .close-btn { background: var(--p); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        .tafsir-item { background: #fdfdfd; padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #eee; font-family: 'Amiri', serif; font-size: 19px; line-height: 1.7; text-align: justify; }

        .player-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--p); padding: 10px; border-top: 2px solid var(--g); z-index: 1000; display: none; }
        audio { width: 100%; height: 35px; }
    </style>
</head>
<body>

<div id="home-view">
    <div class="top"><h2>الصلاح الديني للقرآن</h2></div>
    <div class="card">
        <div><div style="font-size:13px; color:#5a461b;">القارئ المختار</div><div style="font-size:20px; font-weight:bold; color:#3a2d0d;">الشيخ ماهر المعيقلي</div></div>
        <div style="font-size:40px;">🎙️</div>
    </div>
    <div class="q-list" id="main-list"></div>
</div>

<div id="content-view">
    <button class="close-btn" onclick="closeView()">🔙 العودة للقائمة الرئيسية</button>
    <div id="tafsir-player-area"></div>
    <hr>
    <div id="content-body"></div>
</div>

<div class="player-footer" id="audio-box">
    <div id="sura-label" style="color:white; font-size:12px; margin-bottom:5px; text-align:center;"></div>
    <audio id="main-audio" controls></audio>
</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    const listDiv = document.getElementById('main-list');
    listDiv.innerHTML = suras.map((s, i) => `
        <div class="s-card">
            <div onclick="openTafsir(${i+1}, '${s}')" style="flex:1;">
                <b style="font-size:17px;">${i+1}. سورة ${s}</b>
                <div style="font-size:11px; color:var(--g);">📖 عرض التفسير المكتوب والصوتي</div>
            </div>
            <div onclick="playAudio(${i+1}, '${s}')" style="padding:8px 12px; background:#f0f0f0; border-radius:8px; color:var(--p); font-size:14px; font-weight:bold;">🎙️ سماع</div>
        </div>
    `).join('');

    function playAudio(id, name) {
        const audio = document.getElementById('main-audio');
        const audioId = String(id).padStart(3, '0');
        // السيرفر الأساسي لماهر المعيقلي
        audio.src = `https://server12.mp3quran.net/maher/${audioId}.mp3`;
        document.getElementById('audio-box').style.display = 'block';
        document.getElementById('sura-label').innerText = "أنت تستمع الآن لسورة: " + name;
        audio.play().catch(() => alert("جاري محاولة تحميل الصوت... تأكد من الإنترنت"));
    }

    async function openTafsir(id, name) {
        const view = document.getElementById('content-view');
        const body = document.getElementById('content-body');
        const playerArea = document.getElementById('tafsir-player-area');
        
        view.style.display = 'block';
        body.innerHTML = `<div style="text-align:center; padding:20px;">جاري تحميل قصة التفسير...</div>`;
        
        const audioId = String(id).padStart(3, '0');
        // سيرفر التفسير الصوتي
        playerArea.innerHTML = `
            <div style="background:#f0f7f4; padding:10px; border-radius:10px; text-align:center; border:1px solid var(--p);">
                <p style="margin:0 0 10px 0; font-weight:bold; color:var(--p);">🎙️ استمع لقصة تفسير ${name}</p>
                <audio id="tafsir-audio" controls style="width:100%;">
                    <source src="https://server14.mp3quran.net/s_hkm/${audioId}.mp3" type="audio/mpeg">
                </audio>
            </div>`;

        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.jalalayn`);
            const data = await res.json();
            let html = `<h3 style="text-align:center; color:var(--p);">تفسير سورة ${name}</h3>`;
            data.data.ayahs.forEach(a => {
                html += `<div class="tafsir-item"><b>(${a.numberInSurah}):</b> ${a.text}</div>`;
            });
            body.innerHTML = html;
        } catch(e) {
            body.innerHTML = `<div style="color:red; text-align:center;">تحميل النص فشل.. تأكد من اتصالك بالإنترنت.</div>`;
        }
    }

    function closeView() {
        document.getElementById('content-view').style.display = 'none';
        const tAudio = document.getElementById('tafsir-audio');
        if(tAudio) tAudio.pause();
    }
</script>

</body>
</html>
