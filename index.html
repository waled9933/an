<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق وليد النهائي</title>
    <style>
        body { font-family: sans-serif; background: #eef2f5; margin: 0; padding: 20px; text-align: center; }
        .header { background: #1b5e20; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; border-bottom: 4px solid #1b5e20; transition: 0.2s; }
        .menu-item:active { transform: scale(0.95); }
        .menu-item h3 { margin: 0; font-size: 18px; color: #333; }
        
        /* الروبوت */
        #bot-btn { position: fixed; bottom: 25px; left: 25px; background: #ff9800; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 1000; border: 3px solid white; }
        #chat { position: fixed; bottom: 100px; left: 25px; width: 280px; height: 350px; background: white; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 5px 25px rgba(0,0,0,0.2); z-index: 1001; border: 2px solid #1b5e20; }
    </style>
</head>
<body>

    <div class="header">
        <h1>تطبيق وليد المسلم</h1>
        <p>كل شيء يعمل الآن بإذن الله</p>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="window.open('https://quran.com/1', '_blank')"><h3>الفاتحة 📖</h3></div>
        <div class="menu-item" onclick="window.open('https://quran.com/2', '_blank')"><h3>البقرة 📖</h3></div>
        <div class="menu-item" onclick="window.open('https://quran.com/18', '_blank')"><h3>الكهف 📖</h3></div>
        <div class="menu-item" onclick="window.open('https://quran.com/36', '_blank')"><h3>يس 📖</h3></div>
        <div class="menu-item" onclick="window.open('https://www.hisnmuslim.com/', '_blank')"><h3>الأذكار 🤲</h3></div>
        <div class="menu-item" onclick="window.open('https://www.tvquran.com/ar/', '_blank')"><h3>إذاعة 🎧</h3></div>
    </div>

    <div id="bot-btn" onclick="document.getElementById('chat').style.display='flex'">🤖</div>

    <div id="chat" onclick="this.style.display='none'">
        <div style="background:#1b5e20; color:white; padding:10px; border-radius:12px 12px 0 0;">الشيخ الروبوت</div>
        <div style="padding:15px; font-size:14px;">
            أهلاً يا وليد!<br><br>
            بما إن المواقع بترفض تفتح "جوه" الصفحة، أنا خليت الزراير تفتح في "صفحة جديدة" عشان تشتغل غصب عنها.<br><br>
            <b>اضغط على أي سورة وهتفتح معاك فوراً!</b>
        </div>
        <div style="color:red; font-size:10px;">اضغط هنا للإغلاق</div>
    </div>

</body>
</html>
