<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>موسوعة المسلم الأسطورية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a3622;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at top, #14533a, #071d14);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* الشاشة الرئيسية */
        .home-screen { padding: 20px; text-align: center; }
        .header-title { margin: 30px 0; color: var(--gold); font-size: 28px; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 10px;
        }

        .main-icon {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            padding: 30px 10px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .main-icon:active { transform: scale(0.9); background: rgba(212, 175, 55, 0.2); }
        .main-icon span { font-size: 45px; display: block; margin-bottom: 10px; }
        .main-icon p { margin: 0; font-weight: bold; font-size: 16px; color: #f1e5ac; }

        /* شاشة العرض المستقلة */
        #content-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fdfcf6;
            color: #333;
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .back-nav {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .quran-verse {
            font-family: 'Amiri', serif;
            font-size: 26px;
            text-align: center;
            background: #fff9e6;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            border: 1px solid #d4af37;
        }

        .tafseer-card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border-right: 5px solid var(--gold);
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .audio-btn {
            background: var(--gold);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* الميكروفون */
        .mic-fab {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 70px;
            height: 70px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="home-screen">
    <h1 class="header-title">🕋 الكنوز الإيمانية</h1>
    
    <div class="icon-grid">
        <div class="main-icon" onclick="openQuran()"><span>📖</span><p>المصحف الكريم</p></div>
        <div class="main-icon" onclick="openTafseerMenu()"><span>📜</span><p>تفسير القرآن</p></div>
        <div class="main-icon" onclick="openWahidStory()"><span>✨</span><p>قصة الوحي</p></div>
        <div class="main-icon" onclick="openSahaba()"><span>👥</span><p>مواقف الصحابة</p></div>
        <div class="main-icon" onclick="openAzkar()"><span>☀️</span><p>أذكار المسلم</p></div>
        <div class="main-icon" onclick="openTasbih()"><span>📿</span><p>المسبحة</p></div>
        <div class="main-icon" onclick="openPrayers()"><span>🕌</span><p>مواقيت الصلاة</p></div>
        <div class="main-icon" onclick="openNames()"><span>💎</span><p>أسماء الله</p></div>
    </div>
</div>

<div id="content-screen">
    <div class="back-nav" onclick="closeScreen()">🔙 العودة للشاشة الرئيسية</div>
    <div id="screen-body"></div>
</div>

<div class="mic-fab" onclick="voiceSearch()">🎙️</div>

<script>
    const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    function showS(h) { 
        document.getElementById('screen-body').innerHTML = h; 
        document.getElementById('content-screen').style.display = 'block'; 
    }
    function closeScreen() { 
        document.getElementById('content-screen').style.display = 'none'; 
        window.speechSynthesis.cancel(); 
    }

    // 1. قصة الوحي (صوتية)
    function openWahidStory() {
        let h = `<h2>📜 قصة بدء الوحي</h2>
        <button class="audio-btn" onclick="speakStory('wahid')">🔊 استمع للقصة</button>
        <div class="tafseer-card" id="wahid-text">
            كان النبي ﷺ يخلو بغار حراء، يتعبد الليالي ذوات العدد.. حتى جاءه الحق وقال له الملك "اقرأ".. فقال "ما أنا بقارئ".. فضمه ضمة شديدة ثم قال {اقرأ باسم ربك الذي خلق}.. عاد النبي يرجف فؤاده لخديجة وهو يقول "زملوني زملوني".. فقالت له: "والله لا يخزيك الله أبداً".
        </div>`;
        showS(h);
    }

    // 2. مواقف الصحابة
    function openSahaba() {
        let h = `<h2>👥 مواقف الصحابة من الوحي</h2>
        <div class="tafseer-card"><b>السيدة خديجة:</b> أول من آمن وثبت قلب النبي ﷺ وقالت له: إنك لتصل الرحم وتقري الضيف.</div>
        <div class="tafseer-card"><b>أبو بكر الصديق:</b> لم يتردد لحظة، قال "إن كان قال فقد صدق"، فسمي بالصديق.</div>
        <div class="tafseer-card"><b>علي بن أبي طالب:</b> شجاعة مبكرة، آمن وهو صبي وقال: الله خلقني ولم يشاور أبي، فلن أشاوره في عبادته.</div>
        <button class="audio-btn" onclick="speakStory('sahaba')">🔊 استمع للمواقف</button>
        <div id="sahaba-text" style="display:none">خديجة كانت خير عون، وأبو بكر كان الصدق المجسد، وعلي كان الشجاعة في طفولته.</div>`;
        showS(h);
    }

    // 3. التفسير (صفحة مستقلة)
    function openTafseerMenu() {
        let h = `<h2>📜 اختر السورة للتفسير</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            ${suras.map((s,i) => `<div class="tafseer-card" onclick="loadTafseer(${i+1},'${s}')">${i+1}. ${s}</div>`).join('')}
        </div>`;
        showS(h);
    }

    async function loadTafseer(id, name) {
        showS("جاري تحميل التفسير الميسر...");
        const [qR, tR] = await Promise.all([
            fetch(`https://api.alquran.cloud/v1/surah/${id}`),
            fetch(`https://api.alquran.cloud/v1/surah/${id}/ar.jalalayn`)
        ]);
        const qD = await qR.json(), tD = await tR.json();
        let h = `<h2>تفسير سورة ${name}</h2>`;
        qD.data.ayahs.forEach((a, i) => {
            h += `<div class="quran-verse">${a.text} ﴿${a.numberInSurah}﴾</div>
                  <div class="tafseer-card"><b>التفسير:</b> ${tD.data.ayahs[i].text} 
                  <button onclick="spk('${tD.data.ayahs[i].text.replace(/'/g,"")}')">🔊</button></div>`;
        });
        h += `<div class="tafseer-card" style="background:#e6ffed"><b>💡 دروس مستفادة:</b> تعظيم الله، والعمل بما في الآيات، والتدبر في معاني القرآن الكريم.</div>`;
        showS(h);
    }

    // وظائف الصوت
    function speakStory(id) {
        let txt = id === 'wahid' ? document.getElementById('wahid-text').innerText : document.getElementById('sahaba-text').innerText;
        spk(txt);
    }
    function spk(t) {
        window.speechSynthesis.cancel();
        let m = new SpeechSynthesisUtterance(t);
        m.lang = 'ar-SA';
        window.speechSynthesis.speak(m);
    }

    // المصحف
    async function openQuran() {
        showS("<h2>المصحف الشريف</h2><div id='s-list'>" + suras.map((s,i)=>`<div class="tafseer-card" onclick="readSura(${i+1},'${s}')">${s}</div>`).join('') + "</div>");
    }
    async function readSura(id, name) {
        const r = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
        const d = await r.json();
        showS(`<h2>سورة ${name}</h2><div class="quran-verse" style="background:white; line-height:2.2">${d.data.ayahs.map(a=>a.text+` ﴿${a.numberInSurah}﴾`).join(' ')}</div>`);
    }

    // الميزات الإضافية
    function openTasbih() {
        showS(`<h2>📿 المسبحة</h2><div style="text-align:center; padding:50px; background:var(--primary); color:white; border-radius:20px;" onclick="document.getElementById('c').innerText++">
        <h1 id="c" style="font-size:80px;">0</h1><p>اضغط للعد</p>
        <button onclick="event.stopPropagation(); document.getElementById('c').innerText=0">تصفير</button></div>`);
    }

    function openNames() {
        showS("<h2>✨ أسماء الله الحسنى</h2><div class='tafseer-card'>الله - الرحمن - الرحيم - الملك - القدوس - السلام - المؤمن - المهيمن...</div>");
    }

    function openAzkar() {
        showS("<h2>☀️ الأذكار</h2><div class='tafseer-card'>أصبحنا وأصبح الملك لله</div><div class='tafseer-card'>أمسين وأمسى الملك لله</div>");
    }

    async function openPrayers() {
        const r = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5');
        const d = await r.json();
        const t = d.data.timings;
        showS(`<h2>🕌 المواقيت</h2><div class='tafseer-card'>الفجر: ${t.Fajr}<br>الظهر: ${t.Dhuhr}<br>العصر: ${t.Asr}<br>المغرب: ${t.Maghrib}<br>العشاء: ${t.Isha}</div>`);
    }

    function voiceSearch() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'ar-SA';
        rec.onresult = (e) => {
            let w = e.results[0][0].transcript;
            let idx = suras.findIndex(s => w.includes(s));
            if(idx !== -1) loadTafseer(idx+1, suras[idx]);
        };
        rec.start();
    }
</script>
</body>
</html>
