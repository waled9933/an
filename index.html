<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق وليد الذكي المتكلم</title>
    <style>
        body { font-family: 'Amiri', serif; background: #f0f4f8; margin: 0; padding-bottom: 80px; text-align: center; }
        header { background: #1b5e20; color: white; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .surah-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .surah-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; color: #1b5e20; font-weight: bold; border: 1px solid #ddd; }
        
        /* نافذة الدردشة المتطورة */
        #chat-window { position: fixed; bottom: 90px; left: 20px; width: 320px; height: 450px; background: white; border-radius: 20px; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; border: 2px solid #1b5e20; overflow: hidden; }
        .chat-header { background: #1b5e20; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; text-align: right; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 25px; outline: none; }
        
        #bot-btn { position: fixed; bottom: 20px; left: 20px; background: #ff9800; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; cursor: pointer; z-index: 1001; box-shadow: 0 5px 15px rgba(0,0,0,0.4); border: 3px solid white; }
    </style>
</head>
<body>

<header>
    <h1>تطبيق وليد المتكلم 🤖🔊</h1>
    <p>اسأل الشيخ الروبوت وسيجيبك بالصوت!</p>
</header>

<div class="surah-grid" id="list"></div>

<div id="bot-btn" onclick="toggleChat()">🤖</div>

<div id="chat-window">
    <div class="chat-header"><span>الشيخ الروبوت المتكلم</span> <span onclick="toggleChat()" style="cursor:pointer">✖️</span></div>
    <div class="chat-messages" id="msgs">
        <div style="background:#e8f5e9; padding:10px; border-radius:10px;">أهلاً يا وليد! أنا الروبوت الذكي، اكتب سؤالك وسأرد عليك بصوتي الآن.</div>
    </div>
    <div class="chat-input">
        <input type="text" id="user-in" placeholder="اسألني أي شيء...">
        <button onclick="askBot()" style="background:#1b5e20; color:white; border:none; padding:10px 15px; border-radius:50%; margin-right:5px; cursor:pointer;">➡️</button>
    </div>
</div>

<script>
    // قائمة السور
    const names = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس"];
    const list = document.getElementById('list');
    names.forEach((n, i) => { list.innerHTML += `<div class="surah-card">${i+1}. ${n}</div>`; });

    function toggleChat() { 
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
    }

    // وظيفة الرد الذكي والنطق بصوت حقيقي
    function askBot() {
        const input = document.getElementById('user-in');
        const msgs = document.getElementById('msgs');
        if(!input.value) return;

        const userText = input.value;
        msgs.innerHTML += `<div style="margin:10px 0; text-align:left;"><span style="background:#ddd; padding:8px; border-radius:10px;">${userText}</span></div>`;
        input.value = "";

        // محاكاة تفكير الذكاء الاصطناعي
        setTimeout(() => {
            let reply = "أبشر يا وليد، بصفتي مساعدك الذكي أقول لك أن " + userText + " موضوع مهم جداً وسأبحث لك عن تفاصيله الدينية الآن.";
            if(userText.includes("سلام")) reply = "وعليكم السلام ورحمة الله وبركاته يا مبرمج وليد، كيف أساعدك اليوم في تطبيقك؟";
            
            msgs.innerHTML += `<div style="margin:10px 0; text-align:right;"><span style="background:#1b5e20; color:white; padding:8px; border-radius:10px;">${reply}</span></div>`;
            msgs.scrollTop = msgs.scrollHeight;

            // --- ميزة الصوت (Text to Speech) ---
            const speech = new SpeechSynthesisUtterance();
            speech.text = reply;
            speech.lang = 'ar-SA'; // لغة عربية
            window.speechSynthesis.speak(speech);
            
        }, 600);
    }
</script>
</body>
</html>
