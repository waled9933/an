<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مصحف وليد PRO</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #2d5a27; }
        select { width: 90%; padding: 10px; margin: 20px 0; border-radius: 5px; font-size: 18px; }
        audio { width: 90%; margin: 10px 0; }
        .btn-back { background: #2d5a27; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>مصحف وليد PRO</h1>
    
    <select id="surahSelect" onchange="loadSurah()">
        <option value="">-- اختر السورة --</option>
        </select>

    <div id="playerArea">
        <h3>تلاوة الشيخ ماهر المعيقلي</h3>
        <audio id="quranAudio" controls></audio>
        
        <h3>تفسير الآيات</h3>
        <div id="tafsirContent" style="text-align: right; padding: 10px; background: #eef7ee; margin-top: 10px; border-radius: 5px; min-height: 50px;">
            اختر سورة لعرض التفسير...
        </div>
    </div>

    <br><br>
    <button class="btn-back" onclick="window.location.reload()">رجوع للقائمة</button>
</div>

<script>
    const surahs = ["الفاتحة", "البقرة", "آل عمران", "النساء", "المائدة", "الأنعام", "الأعراف", "الأنفال", "التوبة", "يونس", "هود", "يوسف", "الرعد", "إبراهيم", "الحجر", "النحل", "الإسراء", "الكهف", "مريم", "طه", "الأنبياء", "الحج", "المؤمنون", "النور", "الفرقان", "الشعراء", "النمل", "القصص", "العنكبوت", "الروم", "لقمان", "السجدة", "الأحزاب", "سبأ", "فاطر", "يس", "الصافات", "ص", "الزمر", "غافر", "فصلت", "الشورى", "الزخرف", "الدخان", "الجاثية", "الأحقاف", "محمد", "الفتح", "الحجرات", "ق", "الذاريات", "الطور", "النجم", "القمر", "الرحمن", "الواقعة", "الحديد", "المجادلة", "الحشر", "الممتحنة", "الصف", "الجمعة", "المنافقون", "التغابن", "الطلاق", "التحريم", "الملك", "القلم", "الحاقة", "المعارج", "نوح", "الجن", "المزمل", "المدثر", "القيامة", "الإنسان", "المرسلات", "النبأ", "النازعات", "عبس", "التكوير", "الانفطار", "المطففين", "الانشقاق", "البروج", "الطارق", "الأعلى", "الغاشية", "الفجر", "البلد", "الشمس", "الليل", "الضحى", "الشرح", "التين", "العلق", "القدر", "البينة", "الزلزلة", "العاديات", "القارعة", "التكاثر", "العصر", "الهمزة", "الفيل", "قريش", "الماعون", "الكوثر", "الكافرون", "النصر", "المسد", "الإخلاص", "الفلق", "الناس"];

    const select = document.getElementById('surahSelect');
    surahs.forEach((name, index) => {
        let option = document.createElement('option');
        option.value = String(index + 1).padStart(3, '0');
        option.textContent = (index + 1) + ". " + name;
        select.appendChild(option);
    });

    function loadSurah() {
        const val = select.value;
        if (val) {
            // الرابط اللي كنا متفقين عليه لماهر المعيقلي
            document.getElementById('quranAudio').src = `https://server12.mp3quran.net/maher/${val}.mp3`;
            document.getElementById('tafsirContent').innerText = "جاري جلب التفسير الخاص بسورة " + surahs[parseInt(val)-1] + "...";
            // هنا كان بيتم الربط مع محرك التفسير آية بآية
        }
    }
</script>

</body>
</html>
