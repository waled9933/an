<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الصلاح الديني للقرآن</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0a3622; --g: #c5a059; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; padding-bottom: 120px; }
        .top { background: var(--p); height: 160px; border-radius: 0 0 40px 40px; padding: 20px; color: white; text-align: center; }
        .card { background: linear-gradient(135deg, #f3e5ab 0%, #c5a059 100%); margin: -80px 20px 20px; border-radius: 25px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid #fff; display: flex; justify-content: space-between; align-items: center; }
        
        .lib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; }
        .lib-item { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid #eee; }
        .lib-item span { font-weight: bold; color: var(--p); font-size: 13px; display: block; margin-top: 5px; }

        /* شاشات المحتوى */
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 3000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .close-btn { background: var(--p); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
        
        .content-box { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-right: 5px solid var(--g); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .amiri { font-family: 'Amiri', serif; font-size: 22px; line-height: 1.8; color: #222; text-align: justify; }

        .player-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--p); padding: 15px; border-top: 3px solid var(--g); z-index: 1001; }
        audio { width: 100%; height: 45px; }
        .s-card { background: white; padding: 18px; border-radius: 15px; margin: 10px 20px; border-right: 6px solid var(--p); display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="home">
    <div class="top"><h2>الصلاح الديني للقرآن</h2></div>
    <div class="card">
        <div><div style="font-size:14px; color:#5a461b;">القارئ الحالي</div><div style="font-size:24px; font-weight:bold;">ماهر المعيقلي</div></div>
        <div style="font-size:50px;">🎙️</div>
    </div>

    <div class="lib-grid">
        <div class="lib-item" onclick="openBukhari()"><div>📜</div><span>صحيح البخاري</span></div>
        <div class="lib-item" onclick="openIssues()"><div>⚖️</div><span>مسائل جدلية</span></div>
        <div class="lib-item" onclick="openLetters()"><div>🔠</div><span>حروف مقطعة</span></div>
        <div class="lib-item" onclick="alert('قسم التفسير تحت التجهيز الكامل')"><div>📖</div><span>التفسير الكامل</span></div>
    </div>

    <div id="surah-list"></div>
</div>

<div id="bukhari-page" class="full-page">
    <button class="close-btn" onclick="closePage('bukhari-page')">🔙 رجوع للرئيسية</button>
    <h2 style="text-align:center; color:var(--p)">كتب صحيح البخاري</h2>
    <div id="bukhari-books">
        <div class="content-box" onclick="fetchHadiths(1, 'بدء الوحي')"><h3>📖 كتاب بدء الوحي</h3></div>
        <div class="content-box" onclick="fetchHadiths(2, 'كتاب الإيمان')"><h3>📖 كتاب الإيمان</h3></div>
        <div class="content-box" onclick="fetchHadiths(3, 'كتاب العلم')"><h3>📖 كتاب العلم</h3></div>
    </div>
    <div id="hadith-list"></div>
</div>

<div id="info-page" class="full-page">
    <button class="close-btn" onclick="closePage('info-page')">🔙 رجوع</button>
    <div id="info-content"></div>
</div>

<div class="player-footer" id="audio-box" style="display:none;">
    <div id="sura-label" style="color:white; font-size:14px; margin-bottom:8px; text-align:center;"></div>
    <audio id="main-audio" controls autoplay></audio>
</div>
