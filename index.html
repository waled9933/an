<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مصحف وليد</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0a3622; color: white; text-align: center; padding: 20px; }
        .btn { background: #c5a059; border: none; padding: 20px; border-radius: 15px; color: white; font-size: 20px; width: 90%; margin: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #status { color: #ffd700; margin: 15px; font-size: 16px; min-height: 20px; }
        #text-box { background: white; color: #333; padding: 20px; border-radius: 15px; margin-top: 20px; display: none; text-align: justify; line-height: 1.8; font-size: 22px; }
    </style>
</head>
<body>

    <h2>مصحف وليد الذهبي 🌙</h2>
    
    <button class="btn" id="mainBtn" onclick="initPermissions()">🎤 اضغط هنا للبحث الصوتي</button>
    
    <div id="status">اضغط على الزرار وابدأ الكلام</div>
    <div id="text-box"></div>

    <script>
        let audio = new Audio();
        
        // دي أهم دالة عشان تفك قفل الأندرويد وكروم
        function initPermissions() {
            // 1. فك قفل الصوت
            audio.play().then(() => { audio.pause(); }).catch(() => {});
            
            // 2. طلب إذن الميكروفون رسمياً
            navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                document.getElementById('status').innerText = "اسمعك الآن.. قل اسم السورة";
                startRecognition();
            })
            .catch(err => {
                alert("برجاء الضغط على 'سماح' أو 'Allow' للميكروفون ليشتغل التطبيق");
            });
        }

        function startRecognition() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ar-SA';
            
            recognition.onresult = (event) => {
                const speechToText = event.results[0][0].transcript;
                document.getElementById('status').innerText = "قلت: " + speechToText;
                searchSurah(speechToText);
            };

            recognition.onerror = (event) => {
                document.getElementById('status').innerText = "حدث خطأ، حاول مرة أخرى";
            };

            recognition.start();
        }

        async function searchSurah(name) {
            const suras = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];
            
            const index = suras.findIndex(s => name.includes(s));
            if (index !== -1) {
                const id = index + 1;
                const audioId = String(id).padStart(3, '0');
                
                // تشغيل الصوت
                audio.src = `https://server8.mp3quran.net/minsh/mjw/${audioId}.mp3`;
                audio.play();

                // عرض النص
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}`);
                const data = await res.json();
                document.getElementById('text-box').style.display = "block";
                document.getElementById('text-box').innerText = data.data.ayahs.map(a => a.text).join(" ");
            } else {
                document.getElementById('status').innerText = "لم أجد سورة بهذا الاسم، جرب مرة أخرى";
            }
        }
    </script>
</body>
</html>
